<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>데이터 용량 단위 변환기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.4"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="데이터 용량 단위 변환기"><div class="wf-grid"><div class="st-field"><label class="st-label" for="size-input" data-ko="용량 값" data-en="Size value">용량 값</label><input id="size-input" type="number" min="0" step="any" value="1"></div><div class="st-field"><label class="st-label" for="size-unit" data-ko="입력 단위" data-en="Input unit">입력 단위</label><select id="size-unit"><option value="B">B</option><option value="KB">KB</option><option value="MB" selected>MB</option><option value="GB">GB</option><option value="TB">TB</option><option value="KiB">KiB</option><option value="MiB">MiB</option><option value="GiB">GiB</option><option value="TiB">TiB</option></select></div><div class="st-field"><label class="st-label" for="size-digits" data-ko="소수 자릿수" data-en="Decimal places">소수 자릿수</label><select id="size-digits"><option>0</option><option>1</option><option selected>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select></div></div><div class="st-actions"><button class="st-primary" id="size-run" type="button" data-ko="변환" data-en="Convert">변환</button><button class="st-secondary" id="size-copy" type="button" data-ko="전체 결과 복사" data-en="Copy all">전체 결과 복사</button><button class="st-secondary" id="size-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="size-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="size-fallback" readonly hidden></textarea><section class="st-result" id="size-result" hidden><h2 data-ko="변환 결과" data-en="Converted sizes">변환 결과</h2><div class="wf-table-wrap"><table><thead><tr><th data-ko="단위" data-en="Unit">단위</th><th data-ko="값" data-en="Value">값</th><th data-ko="기준" data-en="System">기준</th></tr></thead><tbody id="size-body"></tbody></table></div></section></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
