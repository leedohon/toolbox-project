<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HTTP 상태 코드 찾기</title>
<link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/generated-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body>
  <article class="simple-tool" aria-label="HTTP 상태 코드 찾기"><div class="st-field"><label class="st-label" for="code" data-ko="HTTP 상태 코드" data-en="HTTP status code">HTTP 상태 코드</label><input id="code" type="number" min="100" max="599" step="1" value="404" data-ko-placeholder="" data-en-placeholder=""></div><div class="st-actions"><button class="st-primary" id="sg-run" type="button" data-ko="상태 코드 찾기" data-en="Look up status">상태 코드 찾기</button><button class="st-secondary" id="sg-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="sg-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="sg-status" aria-live="polite"></p><section class="st-result" id="sg-result" hidden><h2 data-ko="HTTP 상태 결과" data-en="HTTP status result">HTTP 상태 결과</h2><div id="sg-output"></div></section><textarea class="st-copy-fallback" id="sg-fallback" readonly hidden></textarea></article><script type="module" src="./tool.js?v=0.0.2"></script></body></html>
