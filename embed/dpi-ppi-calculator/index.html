<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DPI·PPI 해상도 계산기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.4"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.1"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="DPI·PPI 해상도 계산기"><div class="wf-grid"><div class="st-field"><label class="st-label" for="dpi-px-width" data-ko="가로 픽셀" data-en="Width in pixels">가로 픽셀</label><input id="dpi-px-width" type="number" min="1" max="100000" value="3000"></div><div class="st-field"><label class="st-label" for="dpi-px-height" data-ko="세로 픽셀" data-en="Height in pixels">세로 픽셀</label><input id="dpi-px-height" type="number" min="1" max="100000" value="2000"></div><div class="st-field"><label class="st-label" for="dpi-size-width" data-ko="실제 가로" data-en="Physical width">실제 가로</label><input id="dpi-size-width" type="number" min="0.01" max="10000" step="0.01" value="10"></div><div class="st-field"><label class="st-label" for="dpi-size-height" data-ko="실제 세로" data-en="Physical height">실제 세로</label><input id="dpi-size-height" type="number" min="0.01" max="10000" step="0.01" value="6.67"></div></div><fieldset class="st-mode"><legend data-ko="실제 크기 단위" data-en="Physical size unit">실제 크기 단위</legend><div class="st-mode-options"><label><input name="dpi-unit" type="radio" value="inch" checked><span>inch</span></label><label><input name="dpi-unit" type="radio" value="cm"><span>cm</span></label></div></fieldset><div class="st-actions"><button class="st-primary" id="dpi-run" type="button" data-ko="DPI 계산" data-en="Calculate DPI">DPI 계산</button><button class="st-secondary" id="dpi-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="dpi-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="dpi-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="dpi-fallback" readonly hidden></textarea><section class="st-result" id="dpi-result" hidden><h2 data-ko="계산 결과" data-en="Calculated density">계산 결과</h2><div class="wf-stats"><div class="wf-stat"><span data-ko="가로 DPI" data-en="Horizontal DPI">가로 DPI</span><strong id="dpi-x"></strong></div><div class="wf-stat"><span data-ko="세로 DPI" data-en="Vertical DPI">세로 DPI</span><strong id="dpi-y"></strong></div><div class="wf-stat"><span data-ko="평균" data-en="Average">평균</span><strong id="dpi-average"></strong></div></div><p class="st-result-detail" id="dpi-detail"></p></section></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
