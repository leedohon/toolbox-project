<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>색상 변환·대비 검사기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.2"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.2.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="색상 변환·대비 검사기"><div class="wf-grid"><div class="st-field"><label class="st-label" for="color-fg-text">글자색</label><div class="wf-color-row"><input id="color-fg" type="color" value="#16232c" aria-label="글자색 선택"><input id="color-fg-text" type="text" value="#16232c" maxlength="7"></div></div><div class="st-field"><label class="st-label" for="color-bg-text">배경색</label><div class="wf-color-row"><input id="color-bg" type="color" value="#eefaff" aria-label="배경색 선택"><input id="color-bg-text" type="text" value="#eefaff" maxlength="7"></div></div></div><div class="st-actions"><button class="st-secondary" id="color-swap" type="button">색상 서로 바꾸기</button><button class="st-secondary" id="color-copy" type="button">변환값 복사</button></div><p class="st-status" id="color-status" aria-live="polite">색상을 바꾸면 대비와 변환값이 즉시 갱신됩니다.</p><section class="wf-color-preview" id="color-preview">읽기 쉬운 색상인가요?<br>Readable colors?</section><section class="st-result"><h2>대비 검사 결과</h2><p class="st-result-value" id="color-ratio"></p><div class="wf-badges" id="color-badges"></div><p class="st-result-detail wf-code" id="color-values"></p></section><textarea class="st-copy-fallback" id="color-fallback" aria-label="직접 복사할 결과" readonly hidden></textarea></article><script type="module" src="./tool.js?v=0.0.2"></script></body></html>
