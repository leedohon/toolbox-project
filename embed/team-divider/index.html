<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>다중팀 편가르기</title><link rel="stylesheet" href="../../assets/play-tools.css?v=0.3.1"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.1.6"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script>
</head>
<body><article class="play-tool" aria-label="다중팀 편가르기">
  <div class="play-field"><span class="play-label">참가자 이름</span><div class="play-list" id="team-members"></div><button class="play-add" id="team-add" type="button">+ 참가자 추가</button><p class="play-help">2~100명 · 마지막 칸에서 Enter를 누르면 다음 참가자가 추가됩니다.</p></div>
  <div class="play-field"><label for="team-count">팀 개수</label><select id="team-count"><option value="2">2개 팀</option><option value="3">3개 팀</option><option value="4">4개 팀</option><option value="5">5개 팀</option><option value="6">6개 팀</option><option value="7">7개 팀</option><option value="8">8개 팀</option><option value="9">9개 팀</option><option value="10">10개 팀</option></select></div>
  <div class="play-actions"><button class="play-primary" id="team-run" type="button">팀 나누기</button><button class="play-secondary" id="team-copy" type="button">결과 복사</button></div>
  <p class="play-status" id="team-status" aria-live="polite">참가자와 팀 개수를 확인해 주세요.</p><textarea class="play-copy-fallback" id="team-copy-fallback" aria-label="직접 복사할 결과" readonly hidden></textarea>
  <section class="play-result" id="team-result" hidden aria-labelledby="team-title"><h2 id="team-title">편가르기 결과</h2><div class="play-teams" id="team-list"></div></section>
  <section class="play-share" aria-labelledby="team-share-title"><h2 id="team-share-title">결과 공유</h2><p class="play-help">결과 코드를 보내면 받은 사람이 같은 결과를 열 수 있습니다.</p><label class="play-label" for="team-share-code">받은 결과 코드</label><textarea id="team-share-code" maxlength="20000" placeholder="친구에게 받은 코드를 붙여넣으세요." spellcheck="false"></textarea><div class="play-actions"><button class="play-primary" id="team-share-copy" type="button">결과 코드 복사</button><button class="play-secondary" id="team-share-load" type="button">같은 결과 열기</button><button class="play-secondary" id="team-share-png" type="button">PNG 저장</button></div><p class="play-share-note">코드에는 입력한 이름과 결과가 포함됩니다. 필요한 사람에게만 공유하세요.</p><p class="play-status" id="team-share-status" aria-live="polite">결과를 만든 뒤 코드 복사나 PNG 저장을 사용할 수 있습니다.</p></section>
</article><script type="module">
import { copyText, setupEmbedHeight, setupListEditor, shuffle } from '../../assets/play-tools.js?v=0.3.1';
import { copyResultCode, decodeResultCode, downloadResultPng, encodeResultCode } from '../../assets/play-share.js?v=0.1.0';
const countInput=document.querySelector('#team-count'),status=document.querySelector('#team-status'),result=document.querySelector('#team-result'),list=document.querySelector('#team-list');let latest=[];
const editor=setupListEditor({container:document.querySelector('#team-members'),addButton:document.querySelector('#team-add'),initialValues:['민수','지영','하늘','도윤'],label:'참가자',placeholder:'예: 민수',min:2,max:100,maxLength:30});
function setStatus(message,error=false){status.textContent=message;status.className='play-status '+(error?'is-error':'is-good');}
function renderTeams(teams,message){const prefix=window.ToolboxI18n?.language==='en'?'Team':'팀';latest=teams.map(team=>[...team]);list.replaceChildren(...latest.map((team,index)=>{const card=document.createElement('section');card.className='play-team';const title=document.createElement('h3');title.textContent=`${prefix} ${index+1} · ${team.length}명`;const names=document.createElement('ol');names.append(...team.map(member=>{const item=document.createElement('li');item.textContent=member;return item;}));card.append(title,names);return card;}));result.hidden=false;setStatus(message||`${latest.flat().length}명을 ${latest.length}개 팀으로 나눴습니다.`);}
function run(){try{const members=editor.getValues(),count=Number(countInput.value);if(count>members.length)throw new Error('팀 개수는 참가자 수보다 많을 수 없습니다.');const mixed=shuffle(members),teams=Array.from({length:count},()=>[]);mixed.forEach((member,index)=>teams[index%count].push(member));renderTeams(teams);}catch(error){result.hidden=true;latest=[];setStatus(error.message,true);}}
const shareCode=document.querySelector('#team-share-code'),shareStatus=document.querySelector('#team-share-status');function setShareStatus(message,error=false){shareStatus.textContent=message;shareStatus.className='play-status '+(error?'is-error':'is-good');}
document.querySelector('#team-share-copy').addEventListener('click',async()=>{if(!latest.length)return setShareStatus('공유할 결과가 없습니다. 먼저 결과를 만들어 주세요.',true);try{const code=encodeResultCode('team-divider',{teams:latest});await copyResultCode(code,shareCode);setShareStatus('결과 코드를 복사했습니다. 받은 사람은 같은 도구에 붙여넣으면 됩니다.');}catch(error){setShareStatus(error.message,true);}});
document.querySelector('#team-share-load').addEventListener('click',()=>{try{const data=decodeResultCode(shareCode.value,'team-divider');if(!Array.isArray(data.teams)||data.teams.length<2||data.teams.length>10||data.teams.some(team=>!Array.isArray(team)||!team.length||team.some(member=>typeof member!=='string'||!member.trim()||member.length>30))||data.teams.flat().length>100)throw new Error('올바른 결과 코드가 아닙니다.');countInput.value=String(data.teams.length);editor.setValues(data.teams.flat());renderTeams(data.teams,'같은 결과를 열었습니다.');setShareStatus('같은 결과를 열었습니다.');}catch(error){setShareStatus(error.message,true);}});
document.querySelector('#team-share-png').addEventListener('click',()=>{if(!latest.length)return setShareStatus('공유할 결과가 없습니다. 먼저 결과를 만들어 주세요.',true);const en=window.ToolboxI18n?.language==='en',prefix=en?'Team':'팀';downloadResultPng({title:en?'Multi-team divider':'다중팀 편가르기',subtitle:en?'Shared result from Toolbox':'초간단 툴박스 결과',sections:latest.map((team,index)=>({heading:`${prefix} ${index+1}`,lines:team.map((member,memberIndex)=>`${memberIndex+1}. ${member}`)})),filename:'team-divider-result.png',footer:new Date().toLocaleString(en?'en-US':'ko-KR')});setShareStatus('PNG 이미지를 저장했습니다.');});
document.querySelector('#team-run').addEventListener('click',run);document.querySelector('#team-copy').addEventListener('click',async()=>{if(!latest.length){setStatus('먼저 팀을 나눠 주세요.',true);return;}const prefix=window.ToolboxI18n?.language==='en'?'Team':'팀',text=latest.map((team,index)=>`${prefix} ${index+1}: ${team.join(', ')}`).join('\n'),fallback=document.querySelector('#team-copy-fallback'),copied=await copyText(text);if(copied){fallback.hidden=true;setStatus('팀 결과를 복사했습니다.');}else{fallback.value=text;fallback.hidden=false;window.ToolboxUX?.focusAndSelect(fallback);setStatus('자동 복사가 차단되었습니다. 아래 결과를 선택해 직접 복사해 주세요.',true);}});addEventListener('toolbox-language-change',()=>{if(latest.length)renderTeams(latest);});setupEmbedHeight('team-divider',{content:true});run();
</script></body></html>
