<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>숫자뽑기</title><link rel="stylesheet" href="../../assets/play-tools.css?v=0.0.1"></head>
<body><article class="play-tool" aria-label="숫자뽑기">
  <div class="play-grid"><div class="play-field"><label for="number-min">최솟값</label><input id="number-min" type="number" min="-1000000" max="1000000" value="1"></div><div class="play-field"><label for="number-max">최댓값</label><input id="number-max" type="number" min="-1000000" max="1000000" value="45"></div></div>
  <div class="play-field"><label for="number-count">뽑을 개수</label><input id="number-count" type="number" min="1" max="100" value="6"></div>
  <div class="play-checks"><label class="play-check"><input id="number-duplicate" type="checkbox">중복 허용</label><label class="play-check"><input id="number-sort" type="checkbox" checked>오름차순 정렬</label></div>
  <div class="play-actions"><button class="play-primary" id="number-run" type="button">숫자 뽑기</button><button class="play-secondary" id="number-copy" type="button">결과 복사</button></div>
  <p class="play-status" id="number-status" aria-live="polite">범위와 개수를 정해 주세요.</p>
  <section class="play-result" id="number-result" hidden aria-labelledby="number-title"><h2 id="number-title">뽑은 숫자</h2><div class="play-chips" id="number-chips"></div></section>
</article><script type="module">
import { copyText, randomInt, setupEmbedHeight } from '../../assets/play-tools.js?v=0.0.1';
const minInput=document.querySelector('#number-min'),maxInput=document.querySelector('#number-max'),countInput=document.querySelector('#number-count'),duplicate=document.querySelector('#number-duplicate'),sort=document.querySelector('#number-sort'),status=document.querySelector('#number-status'),result=document.querySelector('#number-result'),chips=document.querySelector('#number-chips');let latest=[];
function setStatus(message,error=false){status.textContent=message;status.className='play-status '+(error?'is-error':'is-good');}
function run(){const min=Number(minInput.value),max=Number(maxInput.value),count=Number(countInput.value);try{if(!Number.isInteger(min)||!Number.isInteger(max)||min < -1000000||max>1000000||min>max)throw new Error('-1,000,000부터 1,000,000 사이의 올바른 범위를 입력해 주세요.');if(!Number.isInteger(count)||count<1||count>100)throw new Error('뽑을 개수는 1~100으로 입력해 주세요.');const range=max-min+1;if(!duplicate.checked&&count>range)throw new Error('중복 없이 뽑으려면 개수를 숫자 범위보다 작게 입력해 주세요.');latest=[];if(duplicate.checked){for(let index=0;index<count;index+=1)latest.push(min+randomInt(range));}else{const selected=new Set();while(selected.size<count)selected.add(min+randomInt(range));latest=[...selected];}if(sort.checked)latest.sort((a,b)=>a-b);chips.replaceChildren(...latest.map(value=>{const chip=document.createElement('span');chip.className='play-chip';chip.textContent=value;return chip;}));result.hidden=false;setStatus(`${latest.length}개의 숫자를 뽑았습니다.`);}catch(error){result.hidden=true;latest=[];setStatus(error.message,true);}}
document.querySelector('#number-run').addEventListener('click',run);document.querySelector('#number-copy').addEventListener('click',async()=>{if(!latest.length){setStatus('먼저 숫자를 뽑아 주세요.',true);return;}await copyText(latest.join(', '));setStatus('결과를 복사했습니다.');});setupEmbedHeight('number-picker');run();
</script></body></html>
