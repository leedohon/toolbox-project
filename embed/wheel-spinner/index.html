<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>돌림판</title><link rel="stylesheet" href="../../assets/play-tools.css?v=0.2.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.1.0"></script></head>
<body><article class="play-tool" aria-label="돌림판">
  <div class="play-field"><span class="play-label">돌림판 항목</span><div class="play-list" id="wheel-items"></div><button class="play-add" id="wheel-add" type="button">+ 항목 추가</button><p class="play-help">2~20개 · 마지막 칸에서 Enter를 누르면 다음 항목이 추가됩니다.</p></div>
  <div class="play-actions"><button class="play-primary" id="wheel-spin" type="button">돌림판 돌리기</button><button class="play-secondary" id="wheel-redraw" type="button">항목 반영</button></div>
  <p class="play-status" id="wheel-status" aria-live="polite">항목을 확인하고 돌림판을 돌려 보세요.</p>
  <section class="play-result" aria-labelledby="wheel-title"><h2 id="wheel-title">돌림판</h2><div class="play-canvas-wrap"><canvas id="wheel-canvas" width="640" height="640" aria-label="돌림판 그림"></canvas></div><p class="play-wheel-result" id="wheel-winner" aria-live="polite">어떤 항목이 나올까요?</p></section>
</article><script type="module">
import { randomInt, setupEmbedHeight, setupListEditor } from '../../assets/play-tools.js?v=0.2.0';
const canvas=document.querySelector('#wheel-canvas'),context=canvas.getContext('2d'),status=document.querySelector('#wheel-status'),winner=document.querySelector('#wheel-winner'),spinButton=document.querySelector('#wheel-spin');let items=[],rotation=0,spinning=false;const colors=['#dff5ff','#ffe6b8','#dff7dc','#ffdfe8','#e9e0ff','#fff3a8','#dcecff','#f4dfc7','#d9f5ef','#f9dfff'];
const editor=setupListEditor({container:document.querySelector('#wheel-items'),addButton:document.querySelector('#wheel-add'),initialValues:['치킨','피자','떡볶이','햄버거','초밥','샐러드'],label:'항목',placeholder:'예: 치킨',min:2,max:20,maxLength:40});
function setStatus(message,error=false){status.textContent=message;status.className='play-status '+(error?'is-error':'is-good');}
function load(){items=editor.getValues();return items;}
function draw(){const size=canvas.width,center=size/2,radius=286,arc=Math.PI*2/items.length;context.clearRect(0,0,size,size);items.forEach((item,index)=>{const start=rotation+index*arc,end=start+arc;context.beginPath();context.moveTo(center,center);context.arc(center,center,radius,start,end);context.closePath();context.fillStyle=colors[index%colors.length];context.fill();context.strokeStyle='#fff';context.lineWidth=4;context.stroke();context.save();context.translate(center,center);context.rotate(start+arc/2);context.textAlign='right';context.fillStyle='#163447';context.font=`800 ${items.length>12?18:22}px Arial`;context.fillText(item.length>12?item.slice(0,11)+'…':item,radius-24,7);context.restore();});context.beginPath();context.arc(center,center,34,0,Math.PI*2);context.fillStyle='#0879b2';context.fill();context.beginPath();context.moveTo(center-18,14);context.lineTo(center+18,14);context.lineTo(center,70);context.closePath();context.fillStyle='#bd2f2f';context.fill();}
function redraw(){try{load();draw();winner.textContent='어떤 항목이 나올까요?';setStatus(`${items.length}개 항목을 반영했습니다.`);}catch(error){setStatus(error.message,true);}}
function spin(){if(spinning)return;try{load();}catch(error){setStatus(error.message,true);return;}spinning=true;spinButton.disabled=true;const chosen=randomInt(items.length),arc=Math.PI*2/items.length,start=rotation,targetBase=-Math.PI/2-(chosen+.5)*arc;let target=targetBase;while(target<start+Math.PI*12)target+=Math.PI*2;const duration=matchMedia('(prefers-reduced-motion: reduce)').matches?80:3200,startTime=performance.now();winner.textContent='돌아가는 중…';setStatus('돌림판이 돌아가고 있습니다.');function frame(now){const progress=Math.min(1,(now-startTime)/duration),ease=1-Math.pow(1-progress,4);rotation=start+(target-start)*ease;draw();if(progress<1)requestAnimationFrame(frame);else{rotation=target%(Math.PI*2);draw();winner.textContent=`🎉 ${items[chosen]}`;setStatus(`결과는 “${items[chosen]}”입니다.`);spinning=false;spinButton.disabled=false;}}requestAnimationFrame(frame);}
document.querySelector('#wheel-redraw').addEventListener('click',redraw);spinButton.addEventListener('click',spin);addEventListener('toolbox-language-change',redraw);setupEmbedHeight('wheel-spinner',{content:true});redraw();
</script></body></html>
