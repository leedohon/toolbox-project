<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2진수·16진수 진법 변환기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.4"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="2진수·16진수 진법 변환기"><div class="st-field"><label class="st-label" for="base-input" data-ko="변환할 정수" data-en="Integer to convert">변환할 정수</label><textarea id="base-input" maxlength="256" spellcheck="false">255</textarea></div><fieldset class="st-mode"><legend data-ko="입력 진법" data-en="Input base">입력 진법</legend><div class="st-mode-options"><label><input name="base-source" type="radio" value="2"><span data-ko="2진수" data-en="Binary">2진수</span></label><label><input name="base-source" type="radio" value="8"><span data-ko="8진수" data-en="Octal">8진수</span></label><label><input name="base-source" type="radio" value="10" checked><span data-ko="10진수" data-en="Decimal">10진수</span></label><label><input name="base-source" type="radio" value="16"><span data-ko="16진수" data-en="Hex">16진수</span></label></div></fieldset><label class="st-check"><input id="base-prefix" type="checkbox" checked><span data-ko="2·8·16진수에 접두어 표시" data-en="Show prefixes for binary, octal, and hex">2·8·16진수에 접두어 표시</span></label><div class="st-actions"><button class="st-primary" id="base-run" type="button" data-ko="변환" data-en="Convert">변환</button><button class="st-secondary" id="base-copy" type="button" data-ko="전체 결과 복사" data-en="Copy all results">전체 결과 복사</button><button class="st-secondary" id="base-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="base-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="base-fallback" readonly hidden></textarea><section class="st-result" id="base-result" hidden><h2 data-ko="변환 결과" data-en="Converted values">변환 결과</h2><div class="wf-stats" id="base-values"></div></section></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
