<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>날짜 계산기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.1.6"></script></head><body>
<article class="simple-tool" aria-label="날짜 계산기">
  <fieldset class="st-mode"><legend>계산 방식</legend><div class="st-mode-options"><label><input type="radio" name="date-mode" value="difference" checked><span>두 날짜 사이</span></label><label><input type="radio" name="date-mode" value="offset"><span>날짜 더하기·빼기</span></label></div></fieldset>
  <section class="st-panel" id="date-difference"><div class="st-grid"><div class="st-field"><label class="st-label" for="date-start">시작일</label><input id="date-start" type="date"></div><div class="st-field"><label class="st-label" for="date-end">종료일</label><input id="date-end" type="date"></div></div><label class="st-check"><input id="date-inclusive" type="checkbox"><span>종료일을 포함해서 계산</span></label></section>
  <section class="st-panel" id="date-offset" hidden><div class="st-grid"><div class="st-field"><label class="st-label" for="date-base">기준일</label><input id="date-base" type="date"></div><div class="st-field"><label class="st-label" for="date-days">더하거나 뺄 일수</label><input id="date-days" type="number" min="-100000" max="100000" step="1" value="30"><p class="st-help">빼려면 -30처럼 음수로 입력하세요.</p></div></div></section>
  <div class="st-actions"><button class="st-primary" id="date-run" type="button">날짜 계산</button><button class="st-secondary" id="date-copy" type="button">결과 복사</button></div><p class="st-status" id="date-status" aria-live="polite">날짜를 선택한 뒤 계산해 주세요.</p><textarea class="st-copy-fallback" id="date-copy-fallback" aria-label="직접 복사할 결과" readonly hidden></textarea>
  <section class="st-result" id="date-result" hidden aria-labelledby="date-result-title"><h2 id="date-result-title">계산 결과</h2><p class="st-result-value" id="date-result-value"></p><p class="st-result-detail" id="date-result-detail"></p></section>
</article><script type="module">
import {copyText,setupEmbedHeight} from '../../assets/play-tools.js?v=0.3.1';
const start=document.querySelector('#date-start'),end=document.querySelector('#date-end'),base=document.querySelector('#date-base'),days=document.querySelector('#date-days'),inclusive=document.querySelector('#date-inclusive'),result=document.querySelector('#date-result'),value=document.querySelector('#date-result-value'),detail=document.querySelector('#date-result-detail'),status=document.querySelector('#date-status');let copyValue='';
const mode=()=>document.querySelector('input[name="date-mode"]:checked').value,dayMs=86400000;
function iso(date){return`${date.getUTCFullYear()}-${String(date.getUTCMonth()+1).padStart(2,'0')}-${String(date.getUTCDate()).padStart(2,'0')}`;}function parse(text){if(!/^\d{4}-\d{2}-\d{2}$/.test(text))return null;const [y,m,d]=text.split('-').map(Number),date=new Date(Date.UTC(y,m-1,d));return iso(date)===text?date:null;}function setStatus(message,error=false){status.textContent=message;status.className='st-status '+(error?'is-error':'is-good');}function locale(){return window.ToolboxI18n?.language==='en'?'en-US':'ko-KR';}function dateText(date){return new Intl.DateTimeFormat(locale(),{timeZone:'UTC',year:'numeric',month:'long',day:'numeric',weekday:'long'}).format(date);}
function calculate(){try{if(mode()==='difference'){const a=parse(start.value),b=parse(end.value);if(!a||!b)throw new Error('시작일과 종료일을 모두 선택해 주세요.');const raw=Math.round((b-a)/dayMs),total=Math.abs(raw)+(inclusive.checked?1:0);value.textContent=`${total.toLocaleString()}일`;detail.textContent=raw===0?'두 날짜가 같습니다.':raw>0?'종료일이 시작일보다 뒤에 있습니다.':'종료일이 시작일보다 앞에 있습니다.';copyValue=`${start.value} ~ ${end.value}: ${total}일`;}
else{const date=parse(base.value),amount=Number(days.value);if(!date)throw new Error('기준일을 선택해 주세요.');if(!Number.isInteger(amount)||amount< -100000||amount>100000)throw new Error('일수는 -100,000부터 100,000 사이의 정수로 입력해 주세요.');date.setUTCDate(date.getUTCDate()+amount);value.textContent=iso(date);detail.textContent=dateText(date);copyValue=`${base.value} ${amount>=0?'+':''}${amount}일 = ${iso(date)} (${dateText(date)})`;}
result.hidden=false;setStatus('날짜 계산을 완료했습니다.');}catch(error){result.hidden=true;copyValue='';setStatus(error.message,true);}}
function syncMode(){const difference=mode()==='difference';document.querySelector('#date-difference').hidden=!difference;document.querySelector('#date-offset').hidden=difference;result.hidden=true;copyValue='';setStatus('날짜를 선택한 뒤 계산해 주세요.');}
document.querySelectorAll('input[name="date-mode"]').forEach(item=>item.addEventListener('change',syncMode));document.querySelector('#date-run').addEventListener('click',calculate);document.querySelector('#date-copy').addEventListener('click',async()=>{if(!copyValue)return setStatus('복사할 계산 결과가 없습니다.',true);const fallback=document.querySelector('#date-copy-fallback'),copied=await copyText(copyValue);if(copied){fallback.hidden=true;setStatus('계산 결과를 복사했습니다.');}else{fallback.value=copyValue;fallback.hidden=false;fallback.focus();fallback.select();setStatus('자동 복사가 차단되었습니다. 아래 결과를 선택해 직접 복사해 주세요.',true);}});
addEventListener('toolbox-language-change',()=>{if(!result.hidden)calculate();});const today=new Date(),todayIso=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;start.value=todayIso;end.value=todayIso;base.value=todayIso;setupEmbedHeight('date-calculator',{content:true});
</script></body></html>
