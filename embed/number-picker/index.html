<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>숫자뽑기</title><link rel="stylesheet" href="../../assets/play-tools.css?v=0.3.1"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.1.3"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script>
</head>
<body><article class="play-tool" aria-label="숫자뽑기">
  <div class="play-grid"><div class="play-field"><label for="number-min">최솟값</label><input id="number-min" type="number" min="-1000000" max="1000000" value="1"></div><div class="play-field"><label for="number-max">최댓값</label><input id="number-max" type="number" min="-1000000" max="1000000" value="45"></div></div>
  <div class="play-field"><label for="number-count">뽑을 개수</label><input id="number-count" type="number" min="1" max="100" value="6"></div>
  <div class="play-checks"><label class="play-check"><input id="number-duplicate" type="checkbox">중복 허용</label><label class="play-check"><input id="number-sort" type="checkbox" checked>오름차순 정렬</label></div>
  <div class="play-actions" aria-label="빠른 설정"><button class="play-secondary" id="number-lotto" type="button">로또 6/45</button><button class="play-secondary" id="number-dice" type="button">주사위 1~6</button></div>
  <div class="play-actions"><button class="play-primary" id="number-run" type="button">숫자 뽑기</button><button class="play-secondary" id="number-copy" type="button">결과 복사</button></div>
  <p class="play-status" id="number-status" aria-live="polite">범위와 개수를 정해 주세요.</p><textarea class="play-copy-fallback" id="number-copy-fallback" aria-label="직접 복사할 결과" readonly hidden></textarea>
  <section class="play-result" id="number-result" hidden aria-labelledby="number-title"><h2 id="number-title">뽑은 숫자</h2><div class="play-chips" id="number-chips"></div></section>
  <section class="play-share" aria-labelledby="number-share-title"><h2 id="number-share-title">결과 공유</h2><p class="play-help">결과 코드를 보내면 받은 사람이 같은 숫자를 열 수 있습니다.</p><label class="play-label" for="number-share-code">받은 결과 코드</label><textarea id="number-share-code" maxlength="20000" placeholder="친구에게 받은 코드를 붙여넣으세요." spellcheck="false"></textarea><div class="play-actions"><button class="play-primary" id="number-share-copy" type="button">결과 코드 복사</button><button class="play-secondary" id="number-share-load" type="button">같은 결과 열기</button><button class="play-secondary" id="number-share-png" type="button">PNG 저장</button></div><p class="play-share-note">코드에는 입력한 이름과 결과가 포함됩니다. 필요한 사람에게만 공유하세요.</p><p class="play-status" id="number-share-status" aria-live="polite">결과를 만든 뒤 코드 복사나 PNG 저장을 사용할 수 있습니다.</p></section>
</article><script type="module">
import { copyText, randomInt, setupEmbedHeight } from '../../assets/play-tools.js?v=0.3.2';
import { copyResultCode, decodeResultCode, downloadResultPng, encodeResultCode } from '../../assets/play-share.js?v=0.1.0';
const minInput=document.querySelector('#number-min'),maxInput=document.querySelector('#number-max'),countInput=document.querySelector('#number-count'),duplicate=document.querySelector('#number-duplicate'),sort=document.querySelector('#number-sort'),status=document.querySelector('#number-status'),result=document.querySelector('#number-result'),chips=document.querySelector('#number-chips');let latest=[];
function setStatus(message,error=false){status.textContent=message;status.className='play-status '+(error?'is-error':'is-good');}
function render(values,message=`${values.length}개의 숫자를 뽑았습니다.`){latest=[...values];chips.replaceChildren(...latest.map(value=>{const chip=document.createElement('span');chip.className='play-chip';chip.textContent=value;return chip;}));result.hidden=false;setStatus(message);}
function run(){const min=Number(minInput.value),max=Number(maxInput.value),count=Number(countInput.value);try{if(!Number.isInteger(min)||!Number.isInteger(max)||min < -1000000||max>1000000||min>max)throw new Error('-1,000,000부터 1,000,000 사이의 올바른 범위를 입력해 주세요.');if(!Number.isInteger(count)||count<1||count>100)throw new Error('뽑을 개수는 1~100으로 입력해 주세요.');const range=max-min+1;if(!duplicate.checked&&count>range)throw new Error('중복 없이 뽑으려면 개수를 숫자 범위보다 작게 입력해 주세요.');const values=[];if(duplicate.checked){for(let index=0;index<count;index+=1)values.push(min+randomInt(range));}else{const selected=new Set();while(selected.size<count)selected.add(min+randomInt(range));values.push(...selected);}if(sort.checked)values.sort((a,b)=>a-b);render(values);}catch(error){result.hidden=true;latest=[];setStatus(error.message,true);}}
function preset(min,max,count,sorted){minInput.value=min;maxInput.value=max;countInput.value=count;duplicate.checked=false;sort.checked=sorted;run();}
const shareCode=document.querySelector('#number-share-code'),shareStatus=document.querySelector('#number-share-status');function setShareStatus(message,error=false){shareStatus.textContent=message;shareStatus.className='play-status '+(error?'is-error':'is-good');}
document.querySelector('#number-share-copy').addEventListener('click',async()=>{if(!latest.length)return setShareStatus('공유할 결과가 없습니다. 먼저 결과를 만들어 주세요.',true);try{const code=encodeResultCode('number-picker',{min:Number(minInput.value),max:Number(maxInput.value),count:Number(countInput.value),duplicate:duplicate.checked,sorted:sort.checked,values:latest});await copyResultCode(code,shareCode);setShareStatus('결과 코드를 복사했습니다. 받은 사람은 같은 도구에 붙여넣으면 됩니다.');}catch(error){setShareStatus(error.message,true);}});
document.querySelector('#number-share-load').addEventListener('click',()=>{try{const data=decodeResultCode(shareCode.value,'number-picker'),unique=new Set(Array.isArray(data.values)?data.values:[]);if(!Number.isInteger(data.min)||!Number.isInteger(data.max)||data.min< -1000000||data.max>1000000||data.min>data.max||!Number.isInteger(data.count)||data.count<1||data.count>100||!Array.isArray(data.values)||data.values.length!==data.count||data.values.some(value=>!Number.isInteger(value)||value<data.min||value>data.max)||(!data.duplicate&&(unique.size!==data.values.length||data.count>data.max-data.min+1)))throw new Error('올바른 결과 코드가 아닙니다.');minInput.value=data.min;maxInput.value=data.max;countInput.value=data.count;duplicate.checked=Boolean(data.duplicate);sort.checked=Boolean(data.sorted);render(data.values,'같은 결과를 열었습니다.');setShareStatus('같은 결과를 열었습니다.');}catch(error){setShareStatus(error.message,true);}});
document.querySelector('#number-share-png').addEventListener('click',()=>{if(!latest.length)return setShareStatus('공유할 결과가 없습니다. 먼저 결과를 만들어 주세요.',true);const en=window.ToolboxI18n?.language==='en';downloadResultPng({title:en?'Number picker':'숫자뽑기',subtitle:en?'Shared result from Toolbox':'초간단 툴박스 결과',sections:[{heading:en?'Settings':'설정',lines:[`${minInput.value} ~ ${maxInput.value} · ${latest.length}`]},{heading:en?'Final result':'확정 결과',lines:[latest.join(', ')]}],filename:'number-picker-result.png',footer:new Date().toLocaleString(en?'en-US':'ko-KR')});setShareStatus('PNG 이미지를 저장했습니다.');});
document.querySelector('#number-lotto').addEventListener('click',()=>preset(1,45,6,true));document.querySelector('#number-dice').addEventListener('click',()=>preset(1,6,1,false));document.querySelector('#number-run').addEventListener('click',run);document.querySelector('#number-copy').addEventListener('click',async()=>{if(!latest.length){setStatus('먼저 숫자를 뽑아 주세요.',true);return;}const text=latest.join(', '),fallback=document.querySelector('#number-copy-fallback'),copied=await copyText(text);if(copied){fallback.hidden=true;setStatus('결과를 복사했습니다.');}else{fallback.value=text;fallback.hidden=false;window.ToolboxUX?.focusAndSelect(fallback);setStatus('자동 복사가 차단되었습니다. 아래 결과를 선택해 직접 복사해 주세요.',true);}});addEventListener('toolbox-language-change',()=>{if(latest.length)render(latest);});setupEmbedHeight('number-picker',{content:true});run();
</script></body></html>
