<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JWT 내용 확인기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.4"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="JWT 내용 확인기"><div class="st-field"><label class="st-label" for="jwt-input" data-ko="JWT 문자열" data-en="JWT string">JWT 문자열</label><textarea id="jwt-input" maxlength="20000" spellcheck="false" data-ko-placeholder="점으로 구분된 JWT를 붙여넣으세요" data-en-placeholder="Paste a dot-separated JWT"></textarea><p class="st-help" data-ko="이 도구는 서명을 검증하지 않습니다. 민감한 실제 토큰은 공유하지 마세요." data-en="This tool does not verify signatures. Do not share sensitive live tokens.">이 도구는 서명을 검증하지 않습니다. 민감한 실제 토큰은 공유하지 마세요.</p></div><div class="st-actions"><button class="st-primary" id="jwt-run" type="button" data-ko="내용 열기" data-en="View contents">내용 열기</button><button class="st-secondary" id="jwt-copy" type="button" data-ko="페이로드 복사" data-en="Copy payload">페이로드 복사</button><button class="st-secondary" id="jwt-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="jwt-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="jwt-fallback" readonly hidden></textarea><section class="st-result" id="jwt-result" hidden><h2 data-ko="디코딩 결과" data-en="Decoded contents">디코딩 결과</h2><div class="wf-grid"><div class="st-field"><label class="st-label" for="jwt-header">Header</label><textarea id="jwt-header" class="wf-output-text" readonly></textarea></div><div class="st-field"><label class="st-label" for="jwt-payload">Payload</label><textarea id="jwt-payload" class="wf-output-text" readonly></textarea></div></div><p class="st-result-detail" id="jwt-times"></p></section></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
