name: Update tool catalog

on:
  push:
    branches:
      - main
    paths:
      - "outputs/*/versions.json"
      - "scripts/build-tool-catalog.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build latest catalog
        run: node scripts/build-tool-catalog.mjs

      - name: Commit generated catalog
        run: |
          if git diff --quiet -- outputs/tools.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/tools.json
          git commit -m "chore: update tool catalog"
          git push
