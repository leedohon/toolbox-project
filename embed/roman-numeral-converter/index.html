<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>로마 숫자 변환기</title>
<link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/generated-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body>
  <article class="simple-tool" aria-label="로마 숫자 변환기"><div class="st-field"><label class="st-label" for="mode" data-ko="변환 방향" data-en="Conversion direction">변환 방향</label><select id="mode"><option value="toRoman">아라비아 숫자 → 로마 숫자 / Arabic → Roman</option><option value="fromRoman">로마 숫자 → 아라비아 숫자 / Roman → Arabic</option></select></div><div class="st-field"><label class="st-label" for="value" data-ko="변환할 값" data-en="Value to convert">변환할 값</label><input id="value" type="text" maxlength="20" value="2026" data-ko-placeholder="예: 2026" data-en-placeholder="Example: 2026"></div><div class="st-actions"><button class="st-primary" id="sg-run" type="button" data-ko="숫자 변환" data-en="Convert number">숫자 변환</button><button class="st-secondary" id="sg-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="sg-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="sg-status" aria-live="polite"></p><section class="st-result" id="sg-result" hidden><h2 data-ko="변환 결과" data-en="Converted result">변환 결과</h2><div id="sg-output"></div></section><textarea class="st-copy-fallback" id="sg-fallback" readonly hidden></textarea></article><script type="module" src="./tool.js?v=0.0.2"></script></body></html>
