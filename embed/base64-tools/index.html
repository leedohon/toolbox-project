<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>인코딩·문자 변환 도구</title>
  <link rel="stylesheet" href="../../assets/tool-hub.css?v=0.1.1">
  <link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0">
  <script src="../../assets/toolbox-i18n.js?v=0.3.1"></script>
  <script src="../../assets/toolbox-ux.js?v=0.1.0"></script>
</head>
<body>
  <main class="tool-hub" data-tool-hub data-tool="base64-tools" data-registry="./modules.json">
    <section class="tool-hub__picker" aria-label="인코딩·문자 변환 도구">
      <p class="tool-hub__help" data-ko="필요한 문자 변환 기능을 선택하세요. 기능을 바꿔도 열어 둔 입력과 결과는 유지됩니다." data-en="Choose a character conversion tool. Open inputs and results stay in place when you switch.">필요한 문자 변환 기능을 선택하세요. 기능을 바꿔도 열어 둔 입력과 결과는 유지됩니다.</p>
      <div data-tool-hub-control></div>
    </section>
    <p class="tool-hub__status" data-tool-hub-status aria-live="polite" data-ko="도구를 준비하고 있습니다." data-en="Preparing tools.">도구를 준비하고 있습니다.</p>
    <section class="tool-hub__stage" data-tool-hub-stage></section>
  </main>
  <script type="module" src="../../assets/tool-hub.js?v=0.1.1"></script>
</body>
</html>
