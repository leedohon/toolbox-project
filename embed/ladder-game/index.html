<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>사다리게임</title><link rel="stylesheet" href="../../assets/play-tools.css?v=0.0.1"></head>
<body><article class="play-tool" aria-label="사다리게임">
  <div class="play-grid">
    <div class="play-field"><label for="ladder-people">참가자</label><textarea id="ladder-people" maxlength="500">민수&#10;지영&#10;하늘&#10;도윤</textarea><p class="play-help">한 줄에 한 명, 2~12명</p></div>
    <div class="play-field"><label for="ladder-outcomes">결과</label><textarea id="ladder-outcomes" maxlength="500">커피 사기&#10;간식 받기&#10;다음 기회&#10;행운의 주인공</textarea><p class="play-help">참가자와 같은 개수로 입력</p></div>
  </div>
  <div class="play-actions"><button class="play-primary" id="ladder-run" type="button">사다리 만들기</button><button class="play-secondary" id="ladder-again" type="button">다시 섞기</button></div>
  <p class="play-status" id="ladder-status" aria-live="polite">참가자와 결과를 입력해 주세요.</p>
  <section class="play-result" id="ladder-result" hidden aria-labelledby="ladder-title"><h2 id="ladder-title">사다리 결과</h2><svg class="play-ladder-svg" id="ladder-svg" viewBox="0 0 600 430" role="img" aria-label="생성된 사다리"></svg><div class="play-mapping" id="ladder-mapping"></div></section>
</article><script type="module">
import { parseLines, randomInt, setupEmbedHeight } from '../../assets/play-tools.js?v=0.0.1';
const peopleInput=document.querySelector('#ladder-people'),outcomesInput=document.querySelector('#ladder-outcomes'),status=document.querySelector('#ladder-status'),result=document.querySelector('#ladder-result'),svg=document.querySelector('#ladder-svg'),mapping=document.querySelector('#ladder-mapping');
function setStatus(message,error=false){status.textContent=message;status.className='play-status '+(error?'is-error':'is-good');}
function draw(){try{const people=parseLines(peopleInput.value,{max:12,maxLength:24,label:'참가자'}),outcomes=parseLines(outcomesInput.value,{max:12,maxLength:30,label:'결과'});if(people.length!==outcomes.length)throw new Error('참가자와 결과 개수를 같게 입력해 주세요.');const count=people.length,rows=[];for(let row=0;row<18;row+=1){const links=[];for(let lane=0;lane<count-1;lane+=1){if((!links.length||links[links.length-1]!==lane-1)&&randomInt(100)<38)links.push(lane);}rows.push(links);}const paths=[];for(let start=0;start<count;start+=1){let lane=start;for(const links of rows){if(links.includes(lane))lane+=1;else if(links.includes(lane-1))lane-=1;}paths.push(lane);}const left=50,right=550,top=36,bottom=394,gap=(right-left)/(count-1),rowGap=(bottom-top)/(rows.length+1);svg.replaceChildren();const add=(name,attrs,text='')=>{const node=document.createElementNS('http://www.w3.org/2000/svg',name);for(const [key,value] of Object.entries(attrs))node.setAttribute(key,value);node.textContent=text;svg.append(node);};for(let lane=0;lane<count;lane+=1){const x=left+gap*lane;add('text',{x,y:20,'text-anchor':'middle',fill:'#075675','font-size':'13','font-weight':'800'},String(lane+1));add('line',{x1:x,y1:top,x2:x,y2:bottom,stroke:'#7faabd','stroke-width':'4','stroke-linecap':'round'});add('text',{x,y:418,'text-anchor':'middle',fill:'#075675','font-size':'13','font-weight':'800'},String(lane+1));}rows.forEach((links,row)=>links.forEach(lane=>add('line',{x1:left+gap*lane,y1:top+rowGap*(row+1),x2:left+gap*(lane+1),y2:top+rowGap*(row+1),stroke:'#0879b2','stroke-width':'5','stroke-linecap':'round'})));mapping.replaceChildren();people.forEach((person,index)=>{const card=document.createElement('div');card.className='play-map-item';const strong=document.createElement('strong');strong.textContent=person;card.append(strong,document.createTextNode(' → '+outcomes[paths[index]]));mapping.append(card);});result.hidden=false;setStatus(`${count}명의 사다리를 새로 만들었습니다.`);}catch(error){result.hidden=true;setStatus(error.message,true);}}
document.querySelector('#ladder-run').addEventListener('click',draw);document.querySelector('#ladder-again').addEventListener('click',draw);setupEmbedHeight('ladder-game');draw();
</script></body></html>
