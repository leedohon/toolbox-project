<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CSV 표 보기·변환기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.3"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="CSV 표 보기·변환기"><label class="wf-drop" id="csv-drop"><strong data-ko="CSV·TSV 파일을 선택하거나 여기에 놓으세요" data-en="Choose a CSV or TSV file or drop it here">CSV·TSV 파일을 선택하거나 여기에 놓으세요</strong><input id="csv-file" type="file" accept=".csv,.tsv,text/csv,text/tab-separated-values"></label><div class="st-field"><label class="st-label" for="csv-input" data-ko="CSV 또는 TSV 입력" data-en="CSV or TSV input">CSV 또는 TSV 입력</label><textarea id="csv-input" maxlength="1000000">이름,지역,메모
민수,서울,"쉼표, 포함"
지영,부산,확인 완료</textarea></div><div class="wf-grid"><div class="st-field"><label class="st-label" for="csv-delimiter" data-ko="구분자" data-en="Delimiter">구분자</label><select id="csv-delimiter"><option value="auto" data-ko="자동 판별" data-en="Auto detect">자동 판별</option><option value=",">쉼표 (,)</option><option value="tab">탭 (Tab)</option><option value=";">세미콜론 (;)</option><option value="|">세로 막대 (|)</option></select></div><div class="st-field"><label class="st-label" for="csv-output" data-ko="변환 형식" data-en="Output format">변환 형식</label><select id="csv-output"><option value="json">JSON</option><option value="csv">CSV</option><option value="tsv">TSV</option></select></div></div><label class="st-check"><input id="csv-header" type="checkbox" checked><span data-ko="첫 행을 열 이름으로 사용" data-en="Use first row as column names">첫 행을 열 이름으로 사용</span></label><div class="st-actions"><button class="st-primary" id="csv-copy" type="button" data-ko="변환 결과 복사" data-en="Copy converted result">변환 결과 복사</button><button class="st-secondary" id="csv-save" type="button" data-ko="변환 파일 저장" data-en="Save converted file">변환 파일 저장</button></div><p class="st-status" id="csv-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="csv-fallback" readonly hidden></textarea><section class="st-result"><h2 data-ko="표 미리보기" data-en="Table preview">표 미리보기</h2><div class="wf-scroll"><table class="wf-table" id="csv-table"></table></div></section></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
