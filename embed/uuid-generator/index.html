<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>UUID 일괄 생성기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.3"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="UUID 일괄 생성기"><div class="st-field"><label class="st-label" for="uuid-count" data-ko="생성 개수" data-en="Number to generate">생성 개수</label><input id="uuid-count" type="number" inputmode="numeric" min="1" max="100" value="10"></div><fieldset class="st-mode"><legend data-ko="출력 형식" data-en="Output format">출력 형식</legend><div class="st-mode-options"><label><input name="uuid-format" type="radio" value="basic" checked><span data-ko="기본 UUID" data-en="Standard UUID">기본 UUID</span></label><label><input name="uuid-format" type="radio" value="upper"><span data-ko="대문자" data-en="Uppercase">대문자</span></label><label><input name="uuid-format" type="radio" value="compact"><span data-ko="하이픈 제거" data-en="No hyphens">하이픈 제거</span></label></div></fieldset><div class="st-actions"><button class="st-primary" id="uuid-generate" type="button" data-ko="새 UUID 만들기" data-en="Generate new UUIDs">새 UUID 만들기</button><button class="st-secondary" id="uuid-copy" type="button" data-ko="전체 결과 복사" data-en="Copy all">전체 결과 복사</button><button class="st-secondary" id="uuid-save" type="button" data-ko="텍스트 파일 저장" data-en="Save text file">텍스트 파일 저장</button></div><p class="st-status" id="uuid-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="uuid-fallback" readonly hidden></textarea><section class="st-result"><h2 data-ko="생성 결과" data-en="Generated UUIDs">생성 결과</h2><textarea class="wf-output-text" id="uuid-result" readonly></textarea></section></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
