<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>안전한 파일명 정리기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.4"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.1"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="안전한 파일명 정리기"><div class="st-field"><label class="st-label" for="file-name-input" data-ko="원본 파일명" data-en="Original filename">원본 파일명</label><input id="file-name-input" type="text" maxlength="255" value="회의 자료: 최종본?.pdf"></div><fieldset class="st-mode"><legend data-ko="공백 처리" data-en="Spaces">공백 처리</legend><div class="st-mode-options"><label><input name="file-separator" type="radio" value="space" checked><span data-ko="공백 유지" data-en="Keep spaces">공백 유지</span></label><label><input name="file-separator" type="radio" value="-"><span data-ko="하이픈" data-en="Hyphen">하이픈</span></label><label><input name="file-separator" type="radio" value="_"><span data-ko="밑줄" data-en="Underscore">밑줄</span></label></div></fieldset><label class="st-check"><input id="file-lower" type="checkbox"><span data-ko="영문을 소문자로 변경" data-en="Convert Latin letters to lowercase">영문을 소문자로 변경</span></label><div class="st-actions"><button class="st-primary" id="file-clean" type="button" data-ko="파일명 정리" data-en="Clean filename">파일명 정리</button><button class="st-secondary" id="file-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="file-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="file-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="file-fallback" readonly hidden></textarea><section class="st-result" id="file-result" hidden><h2 data-ko="안전한 파일명" data-en="Safe filename">안전한 파일명</h2><textarea class="wf-output-text" id="file-output" readonly></textarea><p class="st-result-detail" id="file-detail"></p></section></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
