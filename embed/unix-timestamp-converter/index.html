<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Unix 시간 변환기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.2"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.2.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="Unix 시간 변환기"><section><h2>Unix 시간 → 날짜</h2><div class="wf-grid"><div class="st-field"><label class="st-label" for="time-value">Unix 시간</label><input id="time-value" type="text" inputmode="numeric" placeholder="예: 1784073600"></div><div class="st-field"><label class="st-label" for="time-unit">숫자 단위</label><select id="time-unit"><option value="auto">자동 판별</option><option value="seconds">초</option><option value="milliseconds">밀리초</option></select></div></div><div class="st-actions"><button class="st-primary" id="time-convert" type="button">날짜로 변환</button><button class="st-secondary" id="time-now" type="button">현재 시간 넣기</button></div></section><section class="st-result" id="time-date-result"><h2>변환된 날짜</h2><p class="st-result-value" id="time-local"></p><p class="st-result-detail wf-code" id="time-utc"></p></section><section><h2>날짜 → Unix 시간</h2><div class="st-field"><label class="st-label" for="date-value">내 지역 날짜와 시간</label><input id="date-value" type="datetime-local" step="1"></div><div class="st-actions"><button class="st-primary" id="date-convert" type="button">Unix 시간으로 변환</button><button class="st-secondary" id="time-copy" type="button">결과 복사</button></div></section><p class="st-status" id="time-status" aria-live="polite">초·밀리초를 자동 판별하며 지역 시간과 UTC를 함께 표시합니다.</p><section class="st-result"><h2>Unix 시간 결과</h2><p class="st-result-value wf-code" id="date-seconds"></p><p class="st-result-detail wf-code" id="date-milliseconds"></p></section><textarea class="st-copy-fallback" id="time-fallback" aria-label="직접 복사할 결과" readonly hidden></textarea></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
