<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>텍스트 비교·차이 확인기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.3"><link rel="stylesheet" href="../../assets/longtext-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/longtext-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="텍스트 비교·차이 확인기">
<div class="wf-longtext-stack"><div class="st-field"><label class="st-label" for="diff-original" data-ko="원본 텍스트" data-en="Original text">원본 텍스트</label><textarea id="diff-original" maxlength="50000" data-ko-placeholder="비교할 원본을 입력하세요." data-en-placeholder="Enter the original text.">안녕하세요.
오늘 회의는 오후 2시입니다.
자료를 준비해 주세요.</textarea></div><div class="st-field"><label class="st-label" for="diff-revised" data-ko="수정한 텍스트" data-en="Revised text">수정한 텍스트</label><textarea id="diff-revised" maxlength="50000" data-ko-placeholder="수정한 내용을 입력하세요." data-en-placeholder="Enter the revised text.">안녕하세요.
오늘 회의는 오후 3시입니다.
자료와 메모를 준비해 주세요.</textarea></div></div>
<div class="wf-option-list"><label class="st-check"><input id="diff-space" type="checkbox"><span data-ko="공백 차이 무시" data-en="Ignore whitespace">공백 차이 무시</span></label><label class="st-check"><input id="diff-case" type="checkbox"><span data-ko="영문 대소문자 차이 무시" data-en="Ignore letter case">영문 대소문자 차이 무시</span></label></div><div class="st-actions"><button class="st-primary" id="diff-run" type="button" data-ko="차이 확인" data-en="Compare text">차이 확인</button><button class="st-secondary" id="diff-copy" type="button" data-ko="비교 결과 복사" data-en="Copy comparison">비교 결과 복사</button></div><p class="st-status" id="diff-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="diff-fallback" readonly hidden></textarea><section class="st-result"><h2 data-ko="비교 결과" data-en="Comparison result">비교 결과</h2><div class="wf-stats" id="diff-stats"></div><div class="wf-scroll"><ol class="wf-diff-list" id="diff-result"></ol></div></section></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
