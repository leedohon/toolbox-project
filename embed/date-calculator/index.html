<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>다용도 계산기</title>
  <link rel="stylesheet" href="../../assets/tool-hub.css?v=0.1.0">
  <link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0">
  <script src="../../assets/toolbox-i18n.js?v=0.3.1"></script>
  <script src="../../assets/toolbox-ux.js?v=0.1.0"></script>
</head>
<body>
  <main class="tool-hub" data-tool-hub data-tool="date-calculator" data-registry="./modules.json">
    <section class="tool-hub__picker" aria-label="다용도 계산기">
      <p class="tool-hub__help" data-ko="날짜, 단위, 비율과 자주 쓰는 숫자 계산을 한곳에서 선택하세요." data-en="Choose date, unit, ratio, or common number calculations in one place.">날짜, 단위, 비율과 자주 쓰는 숫자 계산을 한곳에서 선택하세요.</p>
      <div data-tool-hub-control></div>
    </section>
    <p class="tool-hub__status" data-tool-hub-status aria-live="polite" data-ko="도구를 준비하고 있습니다." data-en="Preparing tools.">도구를 준비하고 있습니다.</p>
    <section class="tool-hub__stage" data-tool-hub-stage></section>
  </main>
  <script type="module" src="../../assets/tool-hub.js?v=0.1.0"></script>
</body>
</html>
