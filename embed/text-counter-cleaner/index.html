<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>글자수·텍스트 정리기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.2"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.2.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="글자수·텍스트 정리기"><div class="st-field"><label class="st-label" for="text-input">원본 텍스트</label><textarea id="text-input" placeholder="글자수를 세거나 정리할 텍스트를 입력하세요."></textarea></div><div class="wf-stats"><div class="wf-stat"><span>공백 포함</span><strong id="count-all">0</strong></div><div class="wf-stat"><span>공백 제외</span><strong id="count-no-space">0</strong></div><div class="wf-stat"><span>단어</span><strong id="count-words">0</strong></div><div class="wf-stat"><span>줄</span><strong id="count-lines">0</strong></div><div class="wf-stat"><span>문장</span><strong id="count-sentences">0</strong></div><div class="wf-stat"><span>UTF-8 용량</span><strong id="count-bytes">0 B</strong></div></div><fieldset class="st-mode"><legend>텍스트 정리 옵션</legend><div class="wf-option-list"><label class="st-check"><input id="clean-trim" type="checkbox" checked><span>줄 앞뒤 공백 제거</span></label><label class="st-check"><input id="clean-spaces" type="checkbox" checked><span>연속 공백 하나로</span></label><label class="st-check"><input id="clean-lines" type="checkbox" checked><span>빈 줄 하나만 남기기</span></label><label class="st-check"><input id="clean-breaks" type="checkbox"><span>줄바꿈을 공백으로</span></label></div></fieldset><div class="st-actions"><button class="st-primary" id="text-clean" type="button">선택한 방식으로 정리</button><button class="st-secondary" id="text-copy" type="button">결과 복사</button><button class="st-secondary" id="text-reset" type="button">초기화</button></div><p class="st-status" id="text-status" aria-live="polite">입력과 동시에 글자수와 UTF-8 용량을 계산합니다.</p><div class="st-field"><label class="st-label" for="text-output">정리 결과</label><textarea class="wf-output-text" id="text-output" readonly placeholder="정리한 결과가 여기에 표시됩니다."></textarea></div><textarea class="st-copy-fallback" id="text-fallback" aria-label="직접 복사할 결과" readonly hidden></textarea></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
