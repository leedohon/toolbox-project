<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>줄 정렬·중복 제거기</title>

  <article class="simple-tool" aria-label="줄 정렬·중복 제거기"><div class="st-field"><label class="st-label" for="lines" data-ko="줄 목록" data-en="Lines">줄 목록</label><textarea id="lines" maxlength="100000" data-ko-placeholder="한 줄에 항목 하나" data-en-placeholder="One item per line">바나나
