<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>다중팀 편가르기</title><link rel="stylesheet" href="../../assets/play-tools.css?v=0.2.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.1.0"></script></head>
<body><article class="play-tool" aria-label="다중팀 편가르기">
  <div class="play-field"><span class="play-label">참가자 이름</span><div class="play-list" id="team-members"></div><button class="play-add" id="team-add" type="button">+ 참가자 추가</button><p class="play-help">2~100명 · 마지막 칸에서 Enter를 누르면 다음 참가자가 추가됩니다.</p></div>
  <div class="play-grid"><div class="play-field"><label for="team-count">팀 개수</label><select id="team-count"><option value="2">2개 팀</option><option value="3">3개 팀</option><option value="4">4개 팀</option><option value="5">5개 팀</option><option value="6">6개 팀</option><option value="7">7개 팀</option><option value="8">8개 팀</option><option value="9">9개 팀</option><option value="10">10개 팀</option></select></div><div class="play-field"><label for="team-prefix">팀 이름</label><input id="team-prefix" type="text" maxlength="16" value="팀" placeholder="예: 팀, 조, 그룹" data-i18n-sample="true"></div></div>
  <div class="play-actions"><button class="play-primary" id="team-run" type="button">팀 나누기</button><button class="play-secondary" id="team-copy" type="button">결과 복사</button></div>
  <p class="play-status" id="team-status" aria-live="polite">참가자와 팀 개수를 확인해 주세요.</p>
  <section class="play-result" id="team-result" hidden aria-labelledby="team-title"><h2 id="team-title">편가르기 결과</h2><div class="play-teams" id="team-list"></div></section>
</article><script type="module">
import { copyText, setupEmbedHeight, setupListEditor, shuffle } from '../../assets/play-tools.js?v=0.2.0';
const countInput=document.querySelector('#team-count'),prefixInput=document.querySelector('#team-prefix'),status=document.querySelector('#team-status'),result=document.querySelector('#team-result'),list=document.querySelector('#team-list');let latest=[];
const editor=setupListEditor({container:document.querySelector('#team-members'),addButton:document.querySelector('#team-add'),initialValues:['민수','지영','하늘','도윤'],label:'참가자',placeholder:'예: 민수',min:2,max:100,maxLength:30});
function setStatus(message,error=false){status.textContent=message;status.className='play-status '+(error?'is-error':'is-good');}
function run(){try{const members=editor.getValues(),count=Number(countInput.value),prefix=prefixInput.value.trim()||'팀';if(count>members.length)throw new Error('팀 개수는 참가자 수보다 많을 수 없습니다.');const mixed=shuffle(members);latest=Array.from({length:count},()=>[]);mixed.forEach((member,index)=>latest[index%count].push(member));list.replaceChildren(...latest.map((team,index)=>{const card=document.createElement('section');card.className='play-team';const title=document.createElement('h3');title.textContent=`${prefix} ${index+1} · ${team.length}명`;const names=document.createElement('ol');names.append(...team.map(member=>{const item=document.createElement('li');item.textContent=member;return item;}));card.append(title,names);return card;}));result.hidden=false;setStatus(`${members.length}명을 ${count}개 팀으로 나눴습니다.`);}catch(error){result.hidden=true;latest=[];setStatus(error.message,true);}}
document.querySelector('#team-run').addEventListener('click',run);document.querySelector('#team-copy').addEventListener('click',async()=>{if(!latest.length){setStatus('먼저 팀을 나눠 주세요.',true);return;}const prefix=prefixInput.value.trim()||'팀';await copyText(latest.map((team,index)=>`${prefix} ${index+1}: ${team.join(', ')}`).join('\n'));setStatus('팀 결과를 복사했습니다.');});addEventListener('toolbox-language-change',run);setupEmbedHeight('team-divider',{content:true});run();
</script></body></html>
