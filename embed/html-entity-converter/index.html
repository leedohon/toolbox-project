<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HTML 엔티티 변환기</title>
<link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/generated-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body>
<article class="simple-tool" aria-label="HTML 엔티티 변환기"><div class="st-field"><label class="st-label" for="mode" data-ko="변환 방식" data-en="Conversion mode">변환 방식</label><select id="mode"><option value="encode">HTML 엔티티로 인코딩 / Encode HTML entities</option><option value="decode">원문으로 디코딩 / Decode to text</option></select></div><div class="st-field"><label class="st-label" for="text" data-ko="변환할 텍스트" data-en="Text to convert">변환할 텍스트</label><textarea id="text" maxlength="100000" data-ko-placeholder="예: &lt;strong&gt;안녕하세요&lt;/strong&gt;" data-en-placeholder="Example: &lt;strong&gt;Hello&lt;/strong&gt;">&lt;strong&gt;안녕하세요&lt;/strong&gt;</textarea></div><div class="st-actions"><button class="st-primary" id="sg-run" type="button" data-ko="엔티티 변환" data-en="Convert entities">엔티티 변환</button><button class="st-secondary" id="sg-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="sg-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="sg-status" aria-live="polite"></p><section class="st-result" id="sg-result" hidden><h2 data-ko="변환 결과" data-en="Converted result">변환 결과</h2><div id="sg-output"></div></section><textarea class="st-copy-fallback" id="sg-fallback" readonly hidden></textarea></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
