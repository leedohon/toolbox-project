<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CSS 그라데이션 생성기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.3"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="CSS 그라데이션 생성기"><fieldset class="st-mode"><legend data-ko="그라데이션 유형" data-en="Gradient type">그라데이션 유형</legend><div class="st-mode-options"><label><input name="gradient-type" type="radio" value="linear" checked><span data-ko="선형" data-en="Linear">선형</span></label><label><input name="gradient-type" type="radio" value="radial"><span data-ko="원형" data-en="Radial">원형</span></label></div></fieldset><div class="st-field" id="gradient-angle-wrap"><label class="st-label" for="gradient-angle" data-ko="선형 각도" data-en="Linear angle">선형 각도</label><div class="wf-range-row"><input id="gradient-angle" type="range" min="0" max="360" value="135"><output id="gradient-angle-value">135°</output></div></div><div class="st-field"><span class="st-label" data-ko="색상 지점" data-en="Color stops">색상 지점</span><div class="wf-list" id="gradient-stops"></div><button class="st-secondary" id="gradient-add" type="button" data-ko="+ 색상 지점 추가" data-en="+ Add color stop">+ 색상 지점 추가</button><p class="st-help" data-ko="2~5개 · 각 색상의 위치를 0~100%로 조절하세요." data-en="2–5 stops · Set each color position from 0% to 100%.">2~5개 · 각 색상의 위치를 0~100%로 조절하세요.</p></div><div class="wf-gradient-preview" id="gradient-preview" role="img" aria-label="그라데이션 미리보기"></div><div class="st-actions"><button class="st-primary" id="gradient-copy" type="button" data-ko="CSS 코드 복사" data-en="Copy CSS code">CSS 코드 복사</button></div><p class="st-status" id="gradient-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="gradient-fallback" readonly hidden></textarea><section class="st-result"><h2 data-ko="CSS 결과" data-en="CSS result">CSS 결과</h2><code class="wf-result-code" id="gradient-code"></code></section></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
