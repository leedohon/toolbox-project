<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>텍스트 인코더·디코더</title>
<link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0">
<script src="../../assets/toolbox-i18n.js?v=0.1.8"></script>
<link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1">
<link rel="stylesheet" href="../../assets/base64-tools.css?v=0.2.0">
<script src="../../assets/toolbox-ux.js?v=0.1.0"></script>
</head>
<body>
<section id="b64-tools" class="simple-tool" aria-label="텍스트 인코더·디코더">
  <main class="b64-main">
    <div class="st-field b64-format-field">
      <label class="st-label" for="codec-format">변환 형식</label>
      <select id="codec-format">
        <option value="base64">Base64</option>
        <option value="url">URL</option>
        <option value="ascii">ASCII 10진수 코드</option>
        <option value="unicode">Unicode 코드 포인트</option>
        <option value="hex">UTF-8 16진수</option>
        <option value="binary">UTF-8 2진수</option>
      </select>
      <p class="st-help">원문과 코드를 서로 변환할 형식을 선택하세요.</p>
    </div>
    <fieldset class="st-mode">
      <legend>변환 방식</legend>
      <div class="st-mode-options">
        <label><input type="radio" name="codec-mode" value="encode" checked><span id="codec-encode-label">Base64 인코딩</span></label>
        <label><input type="radio" name="codec-mode" value="decode"><span id="codec-decode-label">Base64 디코딩</span></label>
      </div>
    </fieldset>
    <fieldset class="st-mode" id="url-scope-panel" hidden>
      <legend>처리 범위</legend>
      <div class="st-mode-options">
        <label><input type="radio" name="url-scope" value="component" checked><span>쿼리 값·문장</span></label>
        <label><input type="radio" name="url-scope" value="full"><span>주소 전체</span></label>
      </div>
      <p class="st-help">쿼리 값은 예약문자까지 안전하게 바꾸고, 주소 전체는 : / ? &amp; = 같은 URL 구조를 유지합니다.</p>
    </fieldset>
    <label class="b64-option st-check" id="url-safe-panel" for="b64-url-safe"><input id="b64-url-safe" type="checkbox"><span>텍스트 인코딩 결과를 URL-safe Base64 형식으로 만들기</span></label>

    <div class="b64-grid">
      <div class="b64-panel">
        <label class="st-label" for="b64-input" id="b64-input-label">원본 텍스트</label>
        <textarea id="b64-input" maxlength="100000" placeholder="여기에 텍스트를 입력하거나 붙여 넣으세요." spellcheck="false"></textarea>
        <div class="b64-meta"><span>입력</span><span id="b64-input-count">0자</span></div>
        <div class="b64-drop" id="b64-drop" aria-label="텍스트 또는 파일 드롭 영역">텍스트나 파일을 이곳에 놓으세요</div>
      </div>
      <div class="b64-panel">
        <label class="st-label" for="b64-output" id="b64-output-label">Base64 결과</label>
        <textarea id="b64-output" placeholder="변환 결과가 여기에 표시됩니다." readonly spellcheck="false"></textarea>
        <div class="b64-meta"><span>결과</span><span id="b64-output-count">0자</span></div>
      </div>
    </div>

    <div class="b64-actions st-actions">
      <button class="st-primary" type="button" id="b64-convert">Base64로 인코딩</button>
      <button class="st-secondary" type="button" id="b64-swap">입력·결과 바꾸기</button>
      <button class="st-secondary" type="button" id="b64-copy">결과 복사</button>
      <button class="st-secondary" type="button" id="b64-clear">초기화</button>
    </div>

    <div id="base64-file-tools">
      <div class="b64-file-row">
        <label class="b64-file-label" for="b64-file">파일을 Base64로 변환</label>
        <input id="b64-file" type="file" aria-label="파일 선택">
      </div>
      <div class="b64-download">
        <label for="b64-filename">Base64 결과를 파일로 저장</label>
        <div class="b64-download-row">
          <input id="b64-filename" type="text" value="decoded-file" aria-label="다운로드 파일 이름">
          <button class="st-secondary" type="button" id="b64-download">파일 다운로드</button>
        </div>
      </div>
    </div>
    <p class="st-status" id="b64-message" role="status" aria-live="polite">모든 변환은 이 브라우저에서만 처리합니다.</p>
  </main>
</section>

<script>
(function () {
  'use strict';
  var root = document.getElementById('b64-tools');
  var input = root.querySelector('#b64-input');
  var output = root.querySelector('#b64-output');
  var inputLabel = root.querySelector('#b64-input-label');
  var outputLabel = root.querySelector('#b64-output-label');
  var inputCount = root.querySelector('#b64-input-count');
  var outputCount = root.querySelector('#b64-output-count');
  var convertButton = root.querySelector('#b64-convert');
  var message = root.querySelector('#b64-message');
  var urlSafe = root.querySelector('#b64-url-safe');
  var format = function () { return root.querySelector('#codec-format').value; };
  var mode = function () { return root.querySelector('input[name="codec-mode"]:checked').value; };
  var scope = function () { return root.querySelector('input[name="url-scope"]:checked').value; };

  function setMessage(text, isError) {
    message.textContent = text;
    message.className = 'st-status ' + (isError ? 'is-error' : 'is-good');
  }
  function updateCounts() {
    inputCount.textContent = input.value.length.toLocaleString() + '자';
    outputCount.textContent = output.value.length.toLocaleString() + '자';
  }
  function bytesToBase64(bytes) {
    var binary = '';
    for (var index = 0; index < bytes.length; index += 0x8000) binary += String.fromCharCode.apply(null, bytes.subarray(index, index + 0x8000));
    return btoa(binary);
  }
  function base64ToBytes(value) {
    var normalized = value.replace(/^data:[^,]*,/, '').replace(/\s/g, '').replace(/-/g, '+').replace(/_/g, '/');
    while (normalized.length % 4) normalized += '=';
    if (!normalized || !/^[A-Za-z0-9+/]*={0,2}$/.test(normalized)) throw new Error('유효한 Base64 형식이 아닙니다.');
    var binary = atob(normalized);
    var bytes = new Uint8Array(binary.length);
    for (var index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
    return bytes;
  }
  function toUrlSafe(value) { return value.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, ''); }
  function bytesToHex(bytes) { return Array.from(bytes, function (byte) { return byte.toString(16).toUpperCase().padStart(2, '0'); }).join(' '); }
  function hexToBytes(value) {
    var compact = value.trim().replace(/(?:0x|\\x)/gi, '').replace(/[\s,:-]+/g, '');
    if (!compact || compact.length % 2 || !/^[0-9a-f]+$/i.test(compact)) throw new Error('16진수는 두 자리 바이트 형식으로 입력해 주세요.');
    return new Uint8Array(compact.match(/.{2}/g).map(function (token) { return parseInt(token, 16); }));
  }
  function bytesToBinary(bytes) { return Array.from(bytes, function (byte) { return byte.toString(2).padStart(8, '0'); }).join(' '); }
  function binaryToBytes(value) {
    var compact = value.trim().replace(/[\s,]+/g, '');
    if (!compact || compact.length % 8 || !/^[01]+$/.test(compact)) throw new Error('2진수는 8자리 바이트 형식으로 입력해 주세요.');
    return new Uint8Array(compact.match(/.{8}/g).map(function (token) { return parseInt(token, 2); }));
  }
  function encodeAscii(value) {
    var codes = Array.from(value, function (character) { return character.codePointAt(0); });
    if (codes.some(function (code) { return code > 127; })) throw new Error('ASCII는 영문, 숫자, 기본 기호만 지원합니다. 한글과 이모지는 Unicode를 선택하세요.');
    return codes.join(' ');
  }
  function decodeAscii(value) {
    var tokens = value.trim().split(/[\s,]+/);
    if (!value.trim() || tokens.some(function (token) { return !/^\d{1,3}$/.test(token) || Number(token) > 127; })) throw new Error('ASCII 코드는 0부터 127까지의 숫자로 입력해 주세요.');
    return String.fromCodePoint.apply(String, tokens.map(Number));
  }
  function encodeUnicode(value) {
    return Array.from(value, function (character) { var code = character.codePointAt(0); return 'U+' + code.toString(16).toUpperCase().padStart(code > 0xFFFF ? 6 : 4, '0'); }).join(' ');
  }
  function decodeUnicode(value) {
    var tokens = value.trim().split(/[\s,]+/);
    var codes = tokens.map(function (token) { var match = /^(?:U\+|0x|\\u\{?)([0-9a-f]{1,6})\}?$/i.exec(token); return match ? parseInt(match[1], 16) : NaN; });
    if (!value.trim() || codes.some(function (code) { return !Number.isInteger(code) || code > 0x10FFFF || (code >= 0xD800 && code <= 0xDFFF); })) throw new Error('Unicode 코드는 U+AC00처럼 입력해 주세요.');
    return String.fromCodePoint.apply(String, codes);
  }
  function formatName() { return { base64: 'Base64', url: 'URL', ascii: 'ASCII', unicode: 'Unicode', hex: 'UTF-8 16진수', binary: 'UTF-8 2진수' }[format()]; }
  function convertValue() {
    try {
      if (!input.value) throw new Error('변환할 내용을 입력해 주세요.');
      if (format() === 'url') {
        if (mode() === 'encode') output.value = scope() === 'component' ? encodeURIComponent(input.value) : encodeURI(input.value);
        else output.value = scope() === 'component' ? decodeURIComponent(input.value) : decodeURI(input.value);
        setMessage('URL 변환을 완료했습니다.');
      } else if (format() === 'base64') {
        if (mode() === 'encode') {
          var encoded = bytesToBase64(new TextEncoder().encode(input.value));
          output.value = urlSafe.checked ? toUrlSafe(encoded) : encoded;
        } else output.value = new TextDecoder('utf-8', { fatal: true }).decode(base64ToBytes(input.value));
        setMessage('변환이 완료되었습니다.');
      } else if (format() === 'ascii') output.value = mode() === 'encode' ? encodeAscii(input.value) : decodeAscii(input.value);
      else if (format() === 'unicode') output.value = mode() === 'encode' ? encodeUnicode(input.value) : decodeUnicode(input.value);
      else if (format() === 'hex') output.value = mode() === 'encode' ? bytesToHex(new TextEncoder().encode(input.value)) : new TextDecoder('utf-8', { fatal: true }).decode(hexToBytes(input.value));
      else output.value = mode() === 'encode' ? bytesToBinary(new TextEncoder().encode(input.value)) : new TextDecoder('utf-8', { fatal: true }).decode(binaryToBytes(input.value));
      if (!['base64', 'url'].includes(format())) setMessage(formatName() + ' 변환을 완료했습니다.');
      updateCounts();
      return true;
    } catch (error) {
      output.value = '';
      updateCounts();
      setMessage(error instanceof URIError ? '올바른 URL 인코딩 형식이 아닙니다.' : (error.message || '변환 중 오류가 발생했습니다.'), true);
      return false;
    }
  }
  function syncControls(clearResult) {
    var isUrl = format() === 'url';
    var isBase64 = format() === 'base64';
    var encoding = mode() === 'encode';
    root.querySelector('#url-scope-panel').hidden = !isUrl;
    root.querySelector('#url-safe-panel').hidden = !isBase64;
    root.querySelector('#base64-file-tools').hidden = !isBase64;
    root.querySelector('#b64-drop').hidden = !isBase64;
    root.querySelector('#codec-encode-label').textContent = formatName() + ' 인코딩';
    root.querySelector('#codec-decode-label').textContent = formatName() + ' 디코딩';
    inputLabel.textContent = encoding ? '원본 입력' : formatName() + ' 입력';
    outputLabel.textContent = encoding ? formatName() + ' 결과' : '디코딩 결과';
    input.placeholder = encoding ? '변환할 문장을 입력하세요.' : ({ base64: 'Base64 문자열 또는 data: URL을 입력하세요.', url: '디코딩할 URL 문자열을 입력하세요.', ascii: '예: 72 101 108 108 111', unicode: '예: U+D55C U+AE00', hex: '예: ED 95 9C EA B8 80', binary: '예: 01001000 01101001' }[format()]);
    output.placeholder = '변환 결과가 여기에 표시됩니다.';
    convertButton.textContent = formatName() + ' ' + (encoding ? '인코딩' : '디코딩');
    if (clearResult) output.value = '';
    updateCounts();
    setMessage(formatName() + ' 변환 방식을 선택했습니다.');
  }
  async function copyResult() {
    if (!output.value) return setMessage('복사할 결과가 없습니다.', true);
    try {
      await navigator.clipboard.writeText(output.value);
      setMessage('결과를 복사했습니다.');
    } catch (error) {
      var copied = false;
      try { copied = document.execCommand('copy'); } catch (fallbackError) { copied = false; }
      if (copied) setMessage('결과를 복사했습니다.');
      else { setMessage('자동 복사가 차단되었습니다. 결과 상자에서 필요한 내용을 직접 선택해 복사해 주세요.', true); }
    }
  }
  function loadFile(file) {
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { setMessage('파일은 10MB 이하로 선택해 주세요.', true); root.querySelector('#b64-file').value = ''; return; }
    root.querySelector('#codec-format').value = 'base64';
    root.querySelector('input[name="codec-mode"][value="encode"]').checked = true;
    syncControls(false);
    var reader = new FileReader();
    reader.onload = function () {
      output.value = String(reader.result);
      root.querySelector('#b64-filename').value = file.name + '.txt';
      updateCounts();
      setMessage(file.name + ' 파일을 data: URL Base64로 변환했습니다.');
    };
    reader.onerror = function () { setMessage('파일을 읽지 못했습니다.', true); };
    reader.readAsDataURL(file);
  }

  root.querySelector('#codec-format').addEventListener('change', function () { syncControls(true); });
  root.querySelectorAll('input[name="codec-mode"]').forEach(function (control) { control.addEventListener('change', function () { syncControls(true); }); });
  root.querySelectorAll('input[name="url-scope"]').forEach(function (control) { control.addEventListener('change', function () { if (input.value) convertValue(); }); });
  input.addEventListener('input', updateCounts);
  urlSafe.addEventListener('change', function () { if (format() === 'base64' && mode() === 'encode' && input.value) convertValue(); });
  convertButton.addEventListener('click', convertValue);
  root.querySelector('#b64-swap').addEventListener('click', function () {
    if (!output.value) return setMessage('바꿀 변환 결과가 없습니다.', true);
    var nextInput = output.value;
    root.querySelector('input[name="codec-mode"][value="' + (mode() === 'encode' ? 'decode' : 'encode') + '"]').checked = true;
    syncControls(false);
    input.value = nextInput;
    updateCounts();
    if (convertValue()) setMessage('입력과 결과를 바꾸고 반대 변환 방식으로 전환했습니다.');
  });
  root.querySelector('#b64-copy').addEventListener('click', copyResult);
  root.querySelector('#b64-clear').addEventListener('click', function () { input.value = ''; output.value = ''; updateCounts(); setMessage('입력과 결과를 비웠습니다.'); window.ToolboxUX?.focus(input); });
  root.querySelector('#b64-file').addEventListener('change', function () { loadFile(this.files[0]); });
  var drop = root.querySelector('#b64-drop');
  ['dragenter', 'dragover'].forEach(function (eventName) { drop.addEventListener(eventName, function (event) { event.preventDefault(); drop.classList.add('is-over'); }); });
  ['dragleave', 'drop'].forEach(function (eventName) { drop.addEventListener(eventName, function (event) { event.preventDefault(); drop.classList.remove('is-over'); }); });
  drop.addEventListener('drop', function (event) { var file = event.dataTransfer.files[0]; if (file) loadFile(file); else { input.value = event.dataTransfer.getData('text/plain'); updateCounts(); setMessage('텍스트를 불러왔습니다. 변환 버튼을 눌러 주세요.'); } });
  root.querySelector('#b64-download').addEventListener('click', function () {
    var source = mode() === 'decode' ? input.value : output.value;
    if (!source) return setMessage('저장할 Base64 결과가 없습니다.', true);
    try {
      var mime = (/^data:([^;,]+)/.exec(source) || [])[1] || 'application/octet-stream';
      var blob = new Blob([base64ToBytes(source)], { type: mime });
      var url = URL.createObjectURL(blob);
      var link = document.createElement('a');
      link.href = url;
      link.download = root.querySelector('#b64-filename').value.trim() || 'decoded-file';
      document.body.appendChild(link); link.click(); link.remove(); URL.revokeObjectURL(url);
      setMessage('파일 다운로드를 시작했습니다.');
    } catch (error) { setMessage(error.message || '파일을 만들지 못했습니다.', true); }
  });
  syncControls(false);
}());
</script>
<script>
(function () {
  var scheduled = false;
  function reportHeight() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(function () {
      scheduled = false;
      var height = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
      window.parent.postMessage({ source: 'toolbox-embed', tool: 'base64-tools', height: height }, '*');
    });
  }
  window.addEventListener('load', reportHeight);
  window.addEventListener('resize', reportHeight);
  new ResizeObserver(reportHeight).observe(document.documentElement);
  reportHeight();
}());
</script>
</body>
</html>
