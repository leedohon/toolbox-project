<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>이미지 크기·압축·DPI 도구</title>
  <link rel="stylesheet" href="../../assets/tool-hub.css?v=0.1.0">
