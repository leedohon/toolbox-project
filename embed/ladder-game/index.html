<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>사다리게임</title><link rel="stylesheet" href="../../assets/play-tools.css?v=0.2.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.1.0"></script></head>
<body><article class="play-tool" aria-label="사다리게임">
  <div class="play-field"><span class="play-label">참가자와 결과</span><div class="play-pair-head" aria-hidden="true"><span>번호</span><span>참가자</span><span>결과</span><span>삭제</span></div><div class="play-list" id="ladder-pairs"></div><button class="play-add" id="ladder-add" type="button">+ 참가자와 결과 추가</button><p class="play-help">2~12줄 · 참가자와 결과를 한 줄씩 함께 입력하세요.</p></div>
  <div class="play-actions"><button class="play-primary" id="ladder-run" type="button">사다리 만들기</button><button class="play-secondary" id="ladder-again" type="button">다시 섞기</button></div>
  <p class="play-status" id="ladder-status" aria-live="polite">각 줄의 참가자와 결과를 확인해 주세요.</p>
  <section class="play-result" id="ladder-result" hidden aria-labelledby="ladder-title"><h2 id="ladder-title">사다리 결과</h2><svg class="play-ladder-svg" id="ladder-svg" viewBox="0 0 600 430" role="img" aria-label="생성된 사다리"></svg><div class="play-mapping" id="ladder-mapping"></div></section>
</article><script type="module">
import { randomInt, setupEmbedHeight, setupPairedListEditor } from '../../assets/play-tools.js?v=0.2.0';
const status=document.querySelector('#ladder-status'),result=document.querySelector('#ladder-result'),svg=document.querySelector('#ladder-svg'),mapping=document.querySelector('#ladder-mapping');
const pairs=setupPairedListEditor({container:document.querySelector('#ladder-pairs'),addButton:document.querySelector('#ladder-add'),leftLabel:'참가자',rightLabel:'결과',leftPlaceholder:'예: 민수',rightPlaceholder:'예: 커피 사기',min:2,max:12,initialValues:[{left:'민수',right:'커피 사기'},{left:'지영',right:'간식 받기'},{left:'하늘',right:'다음 기회'},{left:'도윤',right:'행운의 주인공'}]});
function setStatus(message,error=false){status.textContent=message;status.className='play-status '+(error?'is-error':'is-good');}
function draw(){try{const entries=pairs.getValues(),people=entries.map(item=>item.left),outcomes=entries.map(item=>item.right),count=entries.length,rows=[];for(let row=0;row<18;row+=1){const links=[];for(let lane=0;lane<count-1;lane+=1){if((!links.length||links[links.length-1]!==lane-1)&&randomInt(100)<38)links.push(lane);}rows.push(links);}const paths=[];for(let start=0;start<count;start+=1){let lane=start;for(const links of rows){if(links.includes(lane))lane+=1;else if(links.includes(lane-1))lane-=1;}paths.push(lane);}const left=50,right=550,top=36,bottom=394,gap=(right-left)/(count-1),rowGap=(bottom-top)/(rows.length+1);svg.replaceChildren();const add=(name,attrs,text='')=>{const node=document.createElementNS('http://www.w3.org/2000/svg',name);for(const [key,value] of Object.entries(attrs))node.setAttribute(key,value);node.textContent=text;svg.append(node);};for(let lane=0;lane<count;lane+=1){const x=left+gap*lane;add('text',{x,y:20,'text-anchor':'middle',fill:'#075675','font-size':'13','font-weight':'800'},String(lane+1));add('line',{x1:x,y1:top,x2:x,y2:bottom,stroke:'#7faabd','stroke-width':'4','stroke-linecap':'round'});add('text',{x,y:418,'text-anchor':'middle',fill:'#075675','font-size':'13','font-weight':'800'},String(lane+1));}rows.forEach((links,row)=>links.forEach(lane=>add('line',{x1:left+gap*lane,y1:top+rowGap*(row+1),x2:left+gap*(lane+1),y2:top+rowGap*(row+1),stroke:'#0879b2','stroke-width':'5','stroke-linecap':'round'})));mapping.replaceChildren();people.forEach((person,index)=>{const card=document.createElement('div');card.className='play-map-item';const strong=document.createElement('strong');strong.textContent=person;card.append(strong,document.createTextNode(' → '+outcomes[paths[index]]));mapping.append(card);});result.hidden=false;setStatus(`${count}명의 사다리를 새로 만들었습니다.`);}catch(error){result.hidden=true;setStatus(error.message,true);}}
document.querySelector('#ladder-run').addEventListener('click',draw);document.querySelector('#ladder-again').addEventListener('click',draw);addEventListener('toolbox-language-change',draw);setupEmbedHeight('ladder-game',{content:true});draw();
</script></body></html>
