<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>마크다운 표 생성기</title>
<link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/generated-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.1"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body>
  <article class="simple-tool" aria-label="마크다운 표 생성기"><div class="st-field"><label class="st-label" for="headers" data-ko="머리글(쉼표 구분)" data-en="Headers (comma-separated)">머리글(쉼표 구분)</label><input id="headers" type="text" value="이름, 점수, 상태" data-ko-placeholder="이름, 점수, 상태" data-en-placeholder="Name, Score, Status"></div><div class="st-field"><label class="st-label" for="rows" data-ko="행 데이터(한 줄에 한 행)" data-en="Rows (one row per line)">행 데이터(한 줄에 한 행)</label><textarea id="rows" maxlength="100000" data-ko-placeholder="각 행의 셀을 쉼표로 구분" data-en-placeholder="Separate cells with commas">민수, 92, 완료
지수, 87, 진행 중</textarea></div><div class="st-actions"><button class="st-primary" id="sg-run" type="button" data-ko="표 만들기" data-en="Create table">표 만들기</button><button class="st-secondary" id="sg-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="sg-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="sg-status" aria-live="polite"></p><section class="st-result" id="sg-result" hidden><h2 data-ko="마크다운 표 결과" data-en="Markdown table result">마크다운 표 결과</h2><div id="sg-output"></div></section><textarea class="st-copy-fallback" id="sg-fallback" readonly hidden></textarea></article><script type="module" src="./tool.js?v=0.0.2"></script></body></html>
