<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XML 검사·정리 도구</title>
<link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1">
<link rel="stylesheet" href="../../assets/longtext-tools.css?v=0.1.0">
<link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0">
<script src="../../assets/toolbox-i18n.js?v=0.3.0"></script>
<script src="../../assets/toolbox-ux.js?v=0.1.0"></script>
</head>
<body>
<article class="simple-tool" aria-label="XML 검사·정리 도구">
  <div class="wf-longtext-stack">
    <div class="st-field"><label class="st-label" for="xml-input" data-ko="XML 입력" data-en="XML input">XML 입력</label><textarea id="xml-input" maxlength="1000000" spellcheck="false" data-ko-placeholder="검사할 XML을 입력하세요." data-en-placeholder="Enter XML to inspect."><?xml version="1.0" encoding="UTF-8"?>
<tools>
  <tool id="1">Toolbox</tool>
</tools></textarea></div>
    <fieldset class="st-mode"><legend data-ko="결과 방식" data-en="Output format">결과 방식</legend><div class="st-mode-options"><label><input type="radio" name="xml-mode" value="two" checked><span data-ko="2칸 정리" data-en="2-space indent">2칸 정리</span></label><label><input type="radio" name="xml-mode" value="four"><span data-ko="4칸 정리" data-en="4-space indent">4칸 정리</span></label><label><input type="radio" name="xml-mode" value="minify"><span data-ko="한 줄 압축" data-en="Minify">한 줄 압축</span></label></div></fieldset>
  </div>
  <div class="st-actions"><button class="st-primary" id="xml-run" type="button" data-ko="XML 검사·변환" data-en="Validate and format">XML 검사·변환</button><button class="st-secondary" id="xml-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="xml-save" type="button" data-ko="XML 파일 저장" data-en="Save XML file">XML 파일 저장</button><button class="st-secondary" id="xml-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div>
  <p class="st-status" id="xml-status" aria-live="polite"></p>
  <textarea class="st-copy-fallback" id="xml-fallback" readonly hidden></textarea>
  <section class="st-result" id="xml-result" hidden><h2 data-ko="변환 결과" data-en="Formatted XML">변환 결과</h2><textarea class="wf-output-text" id="xml-output" readonly spellcheck="false"></textarea></section>
</article>
<script type="module" src="./tool.js?v=0.0.1"></script>
</body>
</html>
