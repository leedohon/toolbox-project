<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>URL 슬러그 생성기</title>
<link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/generated-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.1"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body>
  <article class="simple-tool" aria-label="URL 슬러그 생성기"><div class="st-field"><label class="st-label" for="text" data-ko="원본 문구" data-en="Source text">원본 문구</label><textarea id="text" maxlength="100000" data-ko-placeholder="예: 초간단 URL 슬러그 만들기" data-en-placeholder="Example: Simple URL Slug Generator">초간단 URL 슬러그 만들기</textarea></div><div class="st-field"><label class="st-label" for="separator" data-ko="단어 구분자" data-en="Word separator">단어 구분자</label><select id="separator"><option value="-">하이픈 (-) / Hyphen (-)</option><option value="_">밑줄 (_) / Underscore (_)</option></select></div><div class="st-actions"><button class="st-primary" id="sg-run" type="button" data-ko="슬러그 만들기" data-en="Create slug">슬러그 만들기</button><button class="st-secondary" id="sg-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="sg-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="sg-status" aria-live="polite"></p><section class="st-result" id="sg-result" hidden><h2 data-ko="슬러그 결과" data-en="Slug result">슬러그 결과</h2><div id="sg-output"></div></section><textarea class="st-copy-fallback" id="sg-fallback" readonly hidden></textarea></article><script type="module" src="./tool.js?v=0.0.2"></script></body></html>
