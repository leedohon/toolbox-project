<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cron 표현식 설명기</title>

  <article class="simple-tool" aria-label="Cron 표현식 설명기"><div class="st-field"><label class="st-label" for="expression" data-ko="Cron 표현식" data-en="Cron expression">Cron 표현식</label><input id="expression" type="text" maxlength="100" value="*/15 9 * * 1,2,3,4,5" data-ko-placeholder="분 시 일 월 요일" data-en-placeholder="minute hour day month weekday"></div><div class="st-actions"><button class="st-primary" id="sg-run" type="button" data-ko="표현식 설명" data-en="Explain expression">표현식 설명</button><button class="st-secondary" id="sg-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="sg-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="sg-status" aria-live="polite"></p><section class="st-result" id="sg-result" hidden><h2 data-ko="Cron 설명" data-en="Cron explanation">Cron 설명</h2><div id="sg-output"></div></section><textarea class="st-copy-fallback" id="sg-fallback" readonly hidden></textarea></article><script type="module" src="./tool.js?v=0.0.2"></script></body></html>
