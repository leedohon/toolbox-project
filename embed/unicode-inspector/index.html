<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>유니코드 문자 분석기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.4"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="유니코드 문자 분석기"><div class="st-field"><label class="st-label" for="unicode-input" data-ko="분석할 텍스트" data-en="Text to inspect">분석할 텍스트</label><textarea id="unicode-input" maxlength="5000">한글 A 😀 </textarea></div><div class="st-actions"><button class="st-primary" id="unicode-run" type="button" data-ko="문자 분석" data-en="Inspect characters">문자 분석</button><button class="st-secondary" id="unicode-copy" type="button" data-ko="TSV 결과 복사" data-en="Copy TSV">TSV 결과 복사</button><button class="st-secondary" id="unicode-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="unicode-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="unicode-fallback" readonly hidden></textarea><section class="st-result" id="unicode-result" hidden><h2 id="unicode-result-title" data-ko="문자별 분석" data-en="Character details">문자별 분석</h2><div class="wf-table-wrap" tabindex="0" role="region" aria-labelledby="unicode-result-title"><table><thead><tr><th data-ko="문자" data-en="Character">문자</th><th data-ko="위치" data-en="Index">위치</th><th>Code point</th><th>UTF-16</th><th>UTF-8 bytes</th><th>HTML</th></tr></thead><tbody id="unicode-body"></tbody></table></div></section></article><script type="module" src="./tool.js?v=0.0.2"></script></body></html>
