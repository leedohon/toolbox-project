<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>화면 비율 계산기</title>
  <link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1">
  <link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0">
  <script src="../../assets/toolbox-i18n.js?v=0.3.0"></script>
  <script src="../../assets/toolbox-ux.js?v=0.1.0"></script>
</head>
<body>
<article class="simple-tool" aria-label="화면 비율 계산기">
  <div class="st-grid">
    <div class="st-field"><label class="st-label" for="ratio-width" data-ko="원본 가로" data-en="Original width">원본 가로</label><input id="ratio-width" type="number" inputmode="numeric" min="1" max="1000000" value="1920"></div>
    <div class="st-field"><label class="st-label" for="ratio-height" data-ko="원본 세로" data-en="Original height">원본 세로</label><input id="ratio-height" type="number" inputmode="numeric" min="1" max="1000000" value="1080"></div>
  </div>
  <fieldset class="st-mode">
    <legend data-ko="목표 크기 기준" data-en="Target dimension">목표 크기 기준</legend>
    <div class="st-mode-options">
      <label><input name="ratio-basis" type="radio" value="width" checked><span data-ko="목표 가로" data-en="Target width">목표 가로</span></label>
      <label><input name="ratio-basis" type="radio" value="height"><span data-ko="목표 세로" data-en="Target height">목표 세로</span></label>
    </div>
  </fieldset>
  <div class="st-field"><label class="st-label" for="ratio-target" id="ratio-target-label" data-ko="목표 가로" data-en="Target width">목표 가로</label><input id="ratio-target" type="number" inputmode="numeric" min="1" max="1000000" value="1280"></div>
  <div class="st-actions"><button class="st-primary" id="ratio-calculate" type="button" data-ko="비율 계산" data-en="Calculate ratio">비율 계산</button><button class="st-secondary" id="ratio-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="ratio-swap" type="button" data-ko="가로·세로 바꾸기" data-en="Swap width and height">가로·세로 바꾸기</button></div>
  <p class="st-status" id="ratio-status" role="status" aria-live="polite"></p>
  <textarea class="st-copy-fallback" id="ratio-fallback" readonly hidden></textarea>
  <section class="st-result" id="ratio-result" hidden><h2 data-ko="계산 결과" data-en="Calculation result">계산 결과</h2><p class="st-result-value" id="ratio-value"></p><p class="st-result-detail" id="ratio-detail"></p></section>
</article>
<script type="module" src="./tool.js?v=0.0.1"></script>
</body>
</html>
