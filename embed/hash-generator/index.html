<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>텍스트·파일 해시 생성기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.4"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="텍스트·파일 해시 생성기">
<div class="st-field"><label class="st-label" for="hash-text" data-ko="텍스트 입력" data-en="Text input">텍스트 입력</label><textarea id="hash-text" maxlength="1000000" data-ko-placeholder="해시를 계산할 텍스트" data-en-placeholder="Text to hash"></textarea></div>
<div class="st-field"><span class="st-label" data-ko="파일 입력" data-en="File input">파일 입력</span><label class="wf-drop" id="hash-drop" for="hash-file" tabindex="0"><strong data-ko="파일을 선택하거나 여기에 놓으세요" data-en="Choose a file or drop it here">파일을 선택하거나 여기에 놓으세요</strong><span id="hash-file-name" data-ko="최대 20MB" data-en="Up to 20 MB">최대 20MB</span></label><input id="hash-file" type="file" hidden></div>
<fieldset class="st-mode"><legend data-ko="알고리즘" data-en="Algorithm">알고리즘</legend><div class="st-mode-options"><label><input name="hash-algorithm" type="radio" value="SHA-256" checked><span>SHA-256</span></label><label><input name="hash-algorithm" type="radio" value="SHA-384"><span>SHA-384</span></label><label><input name="hash-algorithm" type="radio" value="SHA-512"><span>SHA-512</span></label></div></fieldset>
<fieldset class="st-mode"><legend data-ko="출력 형식" data-en="Output case">출력 형식</legend><div class="st-mode-options"><label><input name="hash-case" type="radio" value="lower" checked><span data-ko="소문자" data-en="Lowercase">소문자</span></label><label><input name="hash-case" type="radio" value="upper"><span data-ko="대문자" data-en="Uppercase">대문자</span></label></div></fieldset>
<div class="st-actions"><button class="st-primary" id="hash-run" type="button" data-ko="해시 계산" data-en="Calculate hash">해시 계산</button><button class="st-secondary" id="hash-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button><button class="st-secondary" id="hash-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="hash-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="hash-fallback" readonly hidden></textarea><section class="st-result" id="hash-result" hidden><h2 data-ko="해시 결과" data-en="Hash result">해시 결과</h2><textarea class="wf-output-text" id="hash-output" readonly></textarea></section></article><script type="module" src="./tool.js?v=0.0.1"></script></body></html>
