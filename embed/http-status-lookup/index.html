<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>개발자 빠른 참조·검사 도구</title>
  <link rel="stylesheet" href="../../assets/tool-hub.css?v=0.1.2">
  <link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0">
  <script src="../../assets/toolbox-i18n.js?v=0.3.1"></script>
  <script src="../../assets/toolbox-ux.js?v=0.1.0"></script>
</head>
<body>
  <main class="tool-hub" data-tool-hub data-tool="http-status-lookup" data-registry="./modules.json">
    <section class="tool-hub__picker" aria-label="개발자 빠른 참조·검사 도구">
      <p class="tool-hub__help" data-ko="HTTP, 권한, Cron, MIME과 ISBN 정보를 빠르게 확인하세요." data-en="Quickly check HTTP, permissions, Cron, MIME, and ISBN information.">HTTP, 권한, Cron, MIME과 ISBN 정보를 빠르게 확인하세요.</p>
      <div data-tool-hub-control></div>
    </section>
    <p class="tool-hub__status" data-tool-hub-status aria-live="polite" data-ko="도구를 준비하고 있습니다." data-en="Preparing tools.">도구를 준비하고 있습니다.</p>
    <section class="tool-hub__stage" data-tool-hub-stage></section>
  </main>
  <script type="module" src="../../assets/tool-hub.js?v=0.1.2"></script>
</body>
</html>
