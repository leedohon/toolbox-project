<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>이미지 모자이크 도구</title><link rel="stylesheet" href="../../assets/mosaic-tool.css?v=0.2.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.1.4"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script>
</head>
<body><article class="mosaic-tool" aria-label="이미지 모자이크 도구">
  <label class="mosaic-drop" id="mosaic-drop" for="mosaic-file" tabindex="0"><span><strong>이미지를 여기에 놓으세요</strong>PNG, JPEG, WebP · 최대 15MB<span class="mosaic-drop-button">이미지 선택</span></span></label>
  <input class="mosaic-file" id="mosaic-file" type="file" accept="image/png,image/jpeg,image/webp">
  <div class="mosaic-sample"><button class="mosaic-secondary" id="mosaic-sample" type="button">샘플 이미지로 체험</button></div>
  <p class="mosaic-status" id="mosaic-status" aria-live="polite">이미지는 서버로 전송되지 않고 현재 브라우저에서만 처리됩니다.</p>
  <section class="mosaic-editor" id="mosaic-editor" hidden aria-label="모자이크 편집기">
    <fieldset class="mosaic-mode"><legend>선택 도구</legend><div class="mosaic-mode-options"><label><input type="radio" name="mosaic-mode" value="brush" checked><span>브러시</span></label><label><input type="radio" name="mosaic-mode" value="rectangle"><span>사각형 선택</span></label></div><p class="mosaic-mode-help">브러시로 칠하거나 사각형 범위를 드래그해 모자이크를 적용하세요.</p></fieldset>
    <div class="mosaic-controls">
      <label class="mosaic-control" id="mosaic-brush-control" for="mosaic-brush"><span class="mosaic-control-head"><span>브러시 크기</span><output id="mosaic-brush-value">80px</output></span><input id="mosaic-brush" type="range" min="20" max="200" step="5" value="80"></label>
      <label class="mosaic-control" for="mosaic-strength"><span class="mosaic-control-head"><span>모자이크 강도</span><output id="mosaic-strength-value">18px</output></span><input id="mosaic-strength" type="range" min="6" max="50" step="2" value="18"></label>
    </div>
    <div class="mosaic-stage"><div class="mosaic-canvas-wrap"><canvas id="mosaic-canvas" aria-label="브러시로 칠하거나 사각형 범위를 드래그해 모자이크를 적용할 이미지"></canvas><canvas id="mosaic-overlay" aria-hidden="true"></canvas></div></div>
    <div class="mosaic-actions"><button class="mosaic-secondary" id="mosaic-undo" type="button" disabled>한 단계 되돌리기</button><button class="mosaic-secondary" id="mosaic-reset" type="button">원본으로 초기화</button><button class="mosaic-primary" id="mosaic-download" type="button">PNG 저장</button></div>
  </section>
</article><script type="module">
const fileInput=document.querySelector('#mosaic-file');
const dropZone=document.querySelector('#mosaic-drop');
const status=document.querySelector('#mosaic-status');
const editor=document.querySelector('#mosaic-editor');
const canvas=document.querySelector('#mosaic-canvas');
const context=canvas.getContext('2d',{willReadFrequently:true});
const overlay=document.querySelector('#mosaic-overlay');
const overlayContext=overlay.getContext('2d');
const brush=document.querySelector('#mosaic-brush');
const strength=document.querySelector('#mosaic-strength');
const brushValue=document.querySelector('#mosaic-brush-value');
const strengthValue=document.querySelector('#mosaic-strength-value');
const brushControl=document.querySelector('#mosaic-brush-control');
const undoButton=document.querySelector('#mosaic-undo');
const source=document.createElement('canvas');
const sourceContext=source.getContext('2d');
const sample=document.createElement('canvas');
const sampleContext=sample.getContext('2d');
let loaded=false,drawing=false,currentAction=null,history=[],fileName='mosaic-image';

function setStatus(message,error=false){status.textContent=message;status.className='mosaic-status '+(error?'is-error':'is-good');}
function sendHeight(){const root=document.querySelector('.mosaic-tool'),bodyStyle=getComputedStyle(document.body);parent.postMessage({source:'toolbox-embed',tool:'image-mosaic-tool',height:Math.ceil(root.getBoundingClientRect().bottom+parseFloat(bodyStyle.paddingBottom||0))},'*');}
new ResizeObserver(sendHeight).observe(document.body);addEventListener('load',sendHeight);
function selectedMode(){return document.querySelector('input[name="mosaic-mode"]:checked').value;}
function updateControls(){brushValue.value=`${brush.value}px`;strengthValue.value=`${strength.value}px`;}
function clearOverlay(){overlayContext.clearRect(0,0,overlay.width,overlay.height);}
function renderOriginal(){context.imageSmoothingEnabled=true;context.clearRect(0,0,canvas.width,canvas.height);context.drawImage(source,0,0);}
function activateImage(name){canvas.width=source.width;canvas.height=source.height;overlay.width=source.width;overlay.height=source.height;fileName=name;history=[];loaded=true;renderOriginal();clearOverlay();editor.hidden=false;undoButton.disabled=true;setStatus(`${canvas.width} × ${canvas.height}px 이미지를 불러왔습니다. 브러시로 칠하거나 사각형 범위를 드래그하세요.`);sendHeight();}
function displayScale(){const rect=canvas.getBoundingClientRect();return{scaleX:canvas.width/rect.width,scaleY:canvas.height/rect.height,scale:(canvas.width/rect.width+canvas.height/rect.height)/2};}
function pointFromEvent(event){const rect=canvas.getBoundingClientRect(),scales=displayScale();return{x:Math.max(0,Math.min(canvas.width,(event.clientX-rect.left)*scales.scaleX)),y:Math.max(0,Math.min(canvas.height,(event.clientY-rect.top)*scales.scaleY)),brush:Number(brush.value)*scales.scale,block:Math.max(2,Number(strength.value)*scales.scale)};}
function applyPoint(point){const radius=point.brush/2,left=Math.max(0,point.x-radius),top=Math.max(0,point.y-radius),right=Math.min(canvas.width,point.x+radius),bottom=Math.min(canvas.height,point.y+radius),width=right-left,height=bottom-top;if(width<1||height<1)return;const smallWidth=Math.max(1,Math.round(width/point.block)),smallHeight=Math.max(1,Math.round(height/point.block));sample.width=smallWidth;sample.height=smallHeight;sampleContext.imageSmoothingEnabled=true;sampleContext.clearRect(0,0,smallWidth,smallHeight);sampleContext.drawImage(canvas,left,top,width,height,0,0,smallWidth,smallHeight);context.save();context.beginPath();context.arc(point.x,point.y,radius,0,Math.PI*2);context.clip();context.imageSmoothingEnabled=false;context.drawImage(sample,0,0,smallWidth,smallHeight,left,top,width,height);context.restore();}
function rectangleFrom(start,end){const x=Math.max(0,Math.min(start.x,end.x)),y=Math.max(0,Math.min(start.y,end.y)),right=Math.min(canvas.width,Math.max(start.x,end.x)),bottom=Math.min(canvas.height,Math.max(start.y,end.y));return{type:'rectangle',x,y,width:right-x,height:bottom-y,block:end.block};}
function applyRectangle(rectangle){const left=Math.max(0,rectangle.x),top=Math.max(0,rectangle.y),width=Math.min(canvas.width-left,rectangle.width),height=Math.min(canvas.height-top,rectangle.height);if(width<1||height<1)return;const smallWidth=Math.max(1,Math.round(width/rectangle.block)),smallHeight=Math.max(1,Math.round(height/rectangle.block));sample.width=smallWidth;sample.height=smallHeight;sampleContext.imageSmoothingEnabled=true;sampleContext.clearRect(0,0,smallWidth,smallHeight);sampleContext.drawImage(canvas,left,top,width,height,0,0,smallWidth,smallHeight);context.save();context.imageSmoothingEnabled=false;context.drawImage(sample,0,0,smallWidth,smallHeight,left,top,width,height);context.restore();}
function drawRectanglePreview(rectangle){clearOverlay();const scale=displayScale().scale;overlayContext.save();overlayContext.fillStyle='rgba(8,121,178,.14)';overlayContext.strokeStyle='#0879b2';overlayContext.lineWidth=Math.max(2,3*scale);overlayContext.setLineDash([Math.max(6,10*scale),Math.max(4,6*scale)]);overlayContext.fillRect(rectangle.x,rectangle.y,rectangle.width,rectangle.height);overlayContext.strokeRect(rectangle.x,rectangle.y,rectangle.width,rectangle.height);overlayContext.restore();}
function replay(){renderOriginal();history.forEach(action=>{if(action.type==='rectangle')applyRectangle(action);else action.points.forEach(applyPoint);});undoButton.disabled=!history.length;}
function addBrushPoint(event){const point=pointFromEvent(event),previous=currentAction.points[currentAction.points.length-1];if(previous&&Math.hypot(point.x-previous.x,point.y-previous.y)<point.brush/9)return;currentAction.points.push(point);applyPoint(point);}

async function loadFile(file){try{if(!file)throw new Error('이미지 파일을 선택해 주세요.');if(!['image/png','image/jpeg','image/webp'].includes(file.type))throw new Error('PNG, JPEG, WebP 이미지만 사용할 수 있습니다.');if(file.size>15*1024*1024)throw new Error('파일 크기는 15MB 이하로 선택해 주세요.');const bitmap=await createImageBitmap(file,{imageOrientation:'from-image'});if(bitmap.width>5000||bitmap.height>5000||bitmap.width*bitmap.height>20000000){bitmap.close();throw new Error('이미지는 한 변 5,000px, 전체 2천만 픽셀 이하로 선택해 주세요.');}source.width=bitmap.width;source.height=bitmap.height;sourceContext.clearRect(0,0,source.width,source.height);sourceContext.drawImage(bitmap,0,0);bitmap.close();activateImage((file.name.replace(/\.[^.]+$/,'')||'mosaic-image')+'-mosaic');}catch(error){setStatus(error.message||'이미지를 불러오지 못했습니다.',true);}finally{fileInput.value='';}}
fileInput.addEventListener('change',()=>loadFile(fileInput.files[0]));
['dragenter','dragover'].forEach(type=>dropZone.addEventListener(type,event=>{event.preventDefault();dropZone.classList.add('is-dragging');}));
['dragleave','drop'].forEach(type=>dropZone.addEventListener(type,event=>{event.preventDefault();dropZone.classList.remove('is-dragging');}));
dropZone.addEventListener('drop',event=>loadFile(event.dataTransfer.files[0]));
document.querySelector('#mosaic-sample').addEventListener('click',()=>{source.width=960;source.height=600;const gradient=sourceContext.createLinearGradient(0,0,960,600);gradient.addColorStop(0,'#dff5ff');gradient.addColorStop(1,'#ffe6b8');sourceContext.fillStyle=gradient;sourceContext.fillRect(0,0,960,600);sourceContext.fillStyle='#0879b2';sourceContext.fillRect(70,70,340,190);sourceContext.fillStyle='#fff';sourceContext.font='800 46px Arial';sourceContext.fillText('SAMPLE',120,180);sourceContext.fillStyle='#ffdfe8';sourceContext.beginPath();sourceContext.arc(680,200,110,0,Math.PI*2);sourceContext.fill();sourceContext.fillStyle='#16232c';sourceContext.font='700 32px Arial';sourceContext.fillText('이름: 홍길동',90,420);sourceContext.fillText('번호: 010-1234-5678',90,475);activateImage('sample-mosaic');});

canvas.addEventListener('pointerdown',event=>{if(!loaded)return;if(history.length>=100){setStatus('되돌리기 기록은 최대 100개입니다. 원본으로 초기화한 뒤 계속해 주세요.',true);return;}drawing=true;canvas.setPointerCapture(event.pointerId);const point=pointFromEvent(event);if(selectedMode()==='rectangle'){currentAction={type:'rectangle',start:point,end:point};drawRectanglePreview(rectangleFrom(point,point));}else{currentAction={type:'brush',points:[]};addBrushPoint(event);}});
canvas.addEventListener('pointermove',event=>{if(!drawing)return;if(currentAction.type==='rectangle'){currentAction.end=pointFromEvent(event);drawRectanglePreview(rectangleFrom(currentAction.start,currentAction.end));}else addBrushPoint(event);});
function finishAction(){if(!drawing)return;drawing=false;let applied=false;if(currentAction?.type==='rectangle'){const rectangle=rectangleFrom(currentAction.start,currentAction.end);clearOverlay();if(rectangle.width>=4&&rectangle.height>=4){applyRectangle(rectangle);history.push(rectangle);applied=true;}else setStatus('범위를 조금 더 크게 드래그해 주세요.',true);}else if(currentAction?.points.length){history.push(currentAction);applied=true;}if(applied){undoButton.disabled=false;setStatus(`모자이크를 적용했습니다. 되돌리기 ${history.length}단계가 저장되었습니다.`);}currentAction=null;}
canvas.addEventListener('pointerup',finishAction);canvas.addEventListener('pointercancel',finishAction);
document.querySelectorAll('input[name="mosaic-mode"]').forEach(input=>input.addEventListener('change',()=>{brushControl.hidden=selectedMode()==='rectangle';clearOverlay();setStatus(selectedMode()==='rectangle'?'사각형 선택: 시작점에서 끝점까지 드래그하세요.':'브러시: 숨길 부분을 따라 드래그하세요.');sendHeight();}));
undoButton.addEventListener('click',()=>{if(!history.length)return;history.pop();replay();setStatus(history.length?'한 단계를 되돌렸습니다.':'모든 모자이크를 되돌렸습니다.');});
document.querySelector('#mosaic-reset').addEventListener('click',()=>{if(!loaded)return;history=[];replay();clearOverlay();setStatus('원본 이미지로 초기화했습니다.');});
document.querySelector('#mosaic-download').addEventListener('click',()=>{if(!loaded)return;canvas.toBlob(blob=>{if(!blob){setStatus('PNG 파일을 만들지 못했습니다.',true);return;}const url=URL.createObjectURL(blob),link=document.createElement('a');link.href=url;link.download=fileName+'.png';link.click();setTimeout(()=>URL.revokeObjectURL(url),1000);setStatus('모자이크 이미지를 PNG로 저장했습니다.');},'image/png');});
brush.addEventListener('input',updateControls);strength.addEventListener('input',updateControls);updateControls();sendHeight();
</script></body></html>
