<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>백분율 계산기</title>
  <link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1">
  <link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0">
  <script src="../../assets/toolbox-i18n.js?v=0.2.0"></script>
  <script src="../../assets/toolbox-ux.js?v=0.1.0"></script>
</head>
<body>
<article class="simple-tool" aria-label="백분율 계산기">
  <fieldset class="st-mode">
    <legend data-ko="계산 방식" data-en="Calculation type">계산 방식</legend>
    <div class="st-mode-options">
      <label><input type="radio" name="percent-mode" value="of" checked><span data-ko="전체의 일정 퍼센트" data-en="Percentage of a total">전체의 일정 퍼센트</span></label>
      <label><input type="radio" name="percent-mode" value="share"><span data-ko="전체에서 차지하는 비율" data-en="Share of a total">전체에서 차지하는 비율</span></label>
      <label><input type="radio" name="percent-mode" value="change"><span data-ko="증가·감소율" data-en="Percentage change">증가·감소율</span></label>
    </div>
  </fieldset>
  <div class="st-grid">
    <div class="st-field"><label class="st-label" id="percent-a-label" for="percent-a">퍼센트 (%)</label><input id="percent-a" type="number" inputmode="decimal" value="15" step="any" aria-describedby="percent-status"></div>
    <div class="st-field"><label class="st-label" id="percent-b-label" for="percent-b">전체값</label><input id="percent-b" type="number" inputmode="decimal" value="200" step="any" aria-describedby="percent-status"></div>
  </div>
  <div class="st-actions">
    <button class="st-primary" id="percent-calculate" type="button" data-ko="계산하기" data-en="Calculate">계산하기</button>
    <button class="st-secondary" id="percent-copy" type="button" data-ko="결과 복사" data-en="Copy result">결과 복사</button>
    <button class="st-secondary" id="percent-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button>
  </div>
  <p class="st-status" id="percent-status" aria-live="polite"></p>
  <section class="st-result" id="percent-result"><h2 data-ko="계산 결과" data-en="Calculation result">계산 결과</h2><p class="st-result-value" id="percent-value"></p><p class="st-result-detail wf-code" id="percent-formula"></p></section>
  <textarea class="st-copy-fallback" id="percent-fallback" aria-label="직접 복사할 결과" readonly hidden></textarea>
</article>
<script type="module" src="./tool.js?v=0.0.1"></script>
</body>
</html>
