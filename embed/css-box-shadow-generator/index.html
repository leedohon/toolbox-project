<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CSS 그림자 생성기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.1"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.4"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.3.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="CSS 그림자 생성기"><div class="wf-grid"><div class="st-field"><label class="st-label" for="shadow-x"><span data-ko="가로 위치" data-en="Horizontal offset">가로 위치</span> <strong id="shadow-x-value">0px</strong></label><input id="shadow-x" type="range" min="-50" max="50" value="0"></div><div class="st-field"><label class="st-label" for="shadow-y"><span data-ko="세로 위치" data-en="Vertical offset">세로 위치</span> <strong id="shadow-y-value">12px</strong></label><input id="shadow-y" type="range" min="-50" max="50" value="12"></div><div class="st-field"><label class="st-label" for="shadow-blur"><span data-ko="흐림" data-en="Blur">흐림</span> <strong id="shadow-blur-value">28px</strong></label><input id="shadow-blur" type="range" min="0" max="100" value="28"></div><div class="st-field"><label class="st-label" for="shadow-spread"><span data-ko="확산" data-en="Spread">확산</span> <strong id="shadow-spread-value">0px</strong></label><input id="shadow-spread" type="range" min="-30" max="50" value="0"></div><div class="st-field"><label class="st-label" for="shadow-color" data-ko="그림자 색상" data-en="Shadow color">그림자 색상</label><input id="shadow-color" type="color" value="#0b5f82"></div><div class="st-field"><label class="st-label" for="shadow-alpha"><span data-ko="투명도" data-en="Opacity">투명도</span> <strong id="shadow-alpha-value">25%</strong></label><input id="shadow-alpha" type="range" min="0" max="100" value="25"></div></div><label class="st-check"><input id="shadow-inset" type="checkbox"><span data-ko="안쪽 그림자 (inset)" data-en="Inset shadow">안쪽 그림자 (inset)</span></label><div class="wf-highlight" id="shadow-preview" data-ko="그림자 미리보기" data-en="Shadow preview">그림자 미리보기</div><div class="st-actions"><button class="st-primary" id="shadow-copy" type="button" data-ko="CSS 복사" data-en="Copy CSS">CSS 복사</button><button class="st-secondary" id="shadow-reset" type="button" data-ko="초기화" data-en="Reset">초기화</button></div><p class="st-status" id="shadow-status" aria-live="polite"></p><textarea class="st-copy-fallback" id="shadow-fallback" readonly hidden></textarea><section class="st-result"><h2 data-ko="CSS 코드" data-en="CSS code">CSS 코드</h2><textarea class="wf-output-text" id="shadow-output" readonly></textarea></section></article><script type="module" src="./tool.js?v=0.0.2"></script></body></html>
