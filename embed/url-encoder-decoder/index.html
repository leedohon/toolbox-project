<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>URL 인코더·디코더</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.1.6"></script></head><body>
<article class="simple-tool" aria-label="URL 인코더·디코더">
  <fieldset class="st-mode"><legend>변환 방식</legend><div class="st-mode-options"><label><input type="radio" name="url-mode" value="encode" checked><span>URL 인코딩</span></label><label><input type="radio" name="url-mode" value="decode"><span>URL 디코딩</span></label></div></fieldset>
  <fieldset class="st-mode"><legend>처리 범위</legend><div class="st-mode-options"><label><input type="radio" name="url-scope" value="component" checked><span>쿼리 값·문장</span></label><label><input type="radio" name="url-scope" value="full"><span>주소 전체</span></label></div><p class="st-help">쿼리 값은 예약문자까지 안전하게 바꾸고, 주소 전체는 : / ? &amp; = 같은 URL 구조를 유지합니다.</p></fieldset>
  <div class="st-field"><label class="st-label" for="url-input">원본 입력</label><textarea id="url-input" maxlength="100000" placeholder="변환할 주소나 문장을 입력하세요." spellcheck="false"></textarea></div>
  <div class="st-actions"><button class="st-primary" id="url-run" type="button">URL 인코딩</button><button class="st-secondary" id="url-swap" type="button">입력·결과 바꾸기</button><button class="st-secondary" id="url-copy" type="button">결과 복사</button><button class="st-secondary" id="url-clear" type="button">초기화</button></div>
  <p class="st-status" id="url-status" aria-live="polite">입력 내용은 현재 브라우저에서만 처리됩니다.</p>
  <div class="st-field"><label class="st-label" for="url-output">변환 결과</label><textarea id="url-output" placeholder="변환 결과가 여기에 표시됩니다." readonly spellcheck="false"></textarea></div>
</article><script type="module">
import {copyText,setupEmbedHeight} from '../../assets/play-tools.js?v=0.3.1';
const input=document.querySelector('#url-input'),output=document.querySelector('#url-output'),status=document.querySelector('#url-status'),runButton=document.querySelector('#url-run');
const mode=()=>document.querySelector('input[name="url-mode"]:checked').value,scope=()=>document.querySelector('input[name="url-scope"]:checked').value;
function setStatus(message,error=false){status.textContent=message;status.className='st-status '+(error?'is-error':'is-good');}
function syncMode(){const encoding=mode()==='encode';runButton.textContent=encoding?'URL 인코딩':'URL 디코딩';input.placeholder=encoding?'변환할 주소나 문장을 입력하세요.':'디코딩할 URL 문자열을 입력하세요.';output.value='';setStatus(encoding?'인코딩할 내용을 입력하세요.':'디코딩할 내용을 입력하세요.');}
function convert(){try{if(!input.value)throw new Error('변환할 내용을 입력해 주세요.');output.value=mode()==='encode'?(scope()==='component'?encodeURIComponent(input.value):encodeURI(input.value)):(scope()==='component'?decodeURIComponent(input.value):decodeURI(input.value));setStatus('URL 변환을 완료했습니다.');return true;}catch(error){output.value='';setStatus(error instanceof URIError?'올바른 URL 인코딩 형식이 아닙니다.':error.message,true);return false;}}
document.querySelectorAll('input[name="url-mode"]').forEach(item=>item.addEventListener('change',syncMode));document.querySelectorAll('input[name="url-scope"]').forEach(item=>item.addEventListener('change',()=>{if(input.value)convert();}));runButton.addEventListener('click',convert);
document.querySelector('#url-swap').addEventListener('click',()=>{if(!output.value)return setStatus('바꿀 변환 결과가 없습니다.',true);const value=output.value;document.querySelector(`input[name="url-mode"][value="${mode()==='encode'?'decode':'encode'}"]`).checked=true;syncMode();input.value=value;convert();setStatus('입력과 결과를 바꾸고 반대 변환으로 전환했습니다.');});
document.querySelector('#url-copy').addEventListener('click',async()=>{if(!output.value)return setStatus('복사할 결과가 없습니다.',true);const copied=await copyText(output.value);setStatus(copied?'결과를 복사했습니다.':'자동 복사가 차단되었습니다. 결과 상자를 선택해 직접 복사해 주세요.',!copied);if(!copied){output.focus();output.select();}});
document.querySelector('#url-clear').addEventListener('click',()=>{input.value='';output.value='';setStatus('입력과 결과를 비웠습니다.');input.focus();});setupEmbedHeight('url-encoder-decoder',{content:true});
</script></body></html>
