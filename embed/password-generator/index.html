<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>안전 비밀번호 생성기</title><link rel="stylesheet" href="../../assets/simple-tools.css?v=0.1.0"><link rel="stylesheet" href="../../assets/workflow-tools.css?v=0.0.2"><link rel="stylesheet" href="../../assets/toolbox-i18n.css?v=0.1.0"><script src="../../assets/toolbox-i18n.js?v=0.2.0"></script><script src="../../assets/toolbox-ux.js?v=0.1.0"></script></head><body><article class="simple-tool" aria-label="안전 비밀번호 생성기">
<div class="st-field"><label class="st-label" for="pw-length">비밀번호 길이</label><div class="wf-range-row"><input id="pw-range" type="range" min="8" max="64" value="20"><input id="pw-length" type="number" inputmode="numeric" min="8" max="64" value="20"></div></div>
<fieldset class="st-mode"><legend>포함할 문자</legend><div class="wf-option-list"><label class="st-check"><input id="pw-lower" type="checkbox" checked><span>영문 소문자</span></label><label class="st-check"><input id="pw-upper" type="checkbox" checked><span>영문 대문자</span></label><label class="st-check"><input id="pw-number" type="checkbox" checked><span>숫자</span></label><label class="st-check"><input id="pw-symbol" type="checkbox" checked><span>특수문자</span></label></div></fieldset>
<label class="st-check"><input id="pw-ambiguous" type="checkbox" checked><span>헷갈리는 문자 제외 (0, O, l, I)</span></label><div class="st-actions"><button class="st-primary" id="pw-generate" type="button">새 비밀번호 만들기</button><button class="st-secondary" id="pw-copy" type="button">결과 복사</button></div><p class="st-status" id="pw-status" aria-live="polite">설정을 선택하면 안전한 난수로 비밀번호를 만듭니다.</p><textarea class="st-copy-fallback" id="pw-fallback" aria-label="직접 복사할 결과" readonly hidden></textarea><section class="st-result"><h2>생성 결과</h2><p class="wf-password" id="pw-result"></p><div class="wf-meter" aria-hidden="true"><span id="pw-meter"></span></div><p class="st-result-detail" id="pw-detail"></p></section></article><script type="module" src="./tool.js?v=0.0.2"></script></body></html>
